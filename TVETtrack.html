<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVETtrack</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* ── MaterialM palette ── */
    --primary: #5D87FF;
    --primary-dark: #4570EA;
    --primary-light: #ECF2FF;
    --primary-mid: #C5D7FF;
    --secondary: #49BEFF;
    --secondary-light: #E8F7FF;
    --success: #13DEB9;
    --success-light: #E6FFFA;
    --warning: #FFAE1F;
    --warning-light: #FEF5E5;
    --error: #FA896B;
    --error-light: #FDEDE8;
    --purple: #763EBD;
    --purple-light: #F2ECF9;
    --teal: #0BA39A;
    --teal-light: #E9F6F6;

    /* ── Neutrals ── */
    --bg: #F2F6FA;
    --bg2: #E8EEF5;
    --bg3: #D8E2EF;
    --surface: #FFFFFF;
    --border: #E5EDF5;
    --border2: #C8D8EA;
    --text: #2A3547;
    --text2: #5A6A85;
    --text3: #A2B4C8;

    /* ── Legacy aliases so existing JSX still works ── */
    --accent: var(--primary-dark);
    --accent2: var(--primary);
    --accent3: #6990FF;
    --accent-light: var(--primary-light);
    --accent-mid: var(--primary-mid);
    --amber: #B06200;
    --amber-light: var(--warning-light);
    --red: #C0392B;
    --red-light: var(--error-light);
    --blue: var(--primary-dark);
    --blue-light: var(--primary-light);

    /* ── Sizing ── */
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --shadow: 0 2px 10px rgba(42,53,71,0.07);
    --shadow-md: 0 4px 24px rgba(42,53,71,0.10);
    --shadow-lg: 0 8px 40px rgba(42,53,71,0.14);
    --shadow-accent: 0 4px 20px rgba(93,135,255,0.28);

    --font: 'Plus Jakarta Sans', 'Inter', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --font-serif: 'Plus Jakarta Sans', sans-serif;
    --sidebar-w: 265px;
    --topbar-h: 70px;
    --sidebar-bg: #2A3547;
  }

  html, body, #root { height: 100%; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────────────────── */
  .app-shell { display: flex; height: 100vh; overflow: hidden; }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow-y: auto;
    overflow-x: hidden;
    transition: width 0.22s cubic-bezier(.4,0,.2,1);
    position: relative;
    box-shadow: 4px 0 20px rgba(42,53,71,0.15);
    z-index: 100;
  }
  .sidebar.collapsed { width: 72px; overflow: visible; }
  .sidebar.collapsed .sidebar-logo { padding: 20px 16px; display: flex; align-items: center; justify-content: center; }
  .sidebar.collapsed .logo-mark,
  .sidebar.collapsed .logo-sub,
  .sidebar.collapsed .nav-section-label,
  .sidebar.collapsed .nav-label,
  .sidebar.collapsed .sidebar-footer .user-name,
  .sidebar.collapsed .sidebar-footer .user-badge,
  .sidebar.collapsed .search-section { display: none; }
  .sidebar.collapsed .nav-item { justify-content: center; padding: 11px 0; }
  .sidebar.collapsed .nav-icon { width: auto; font-size: 20px; margin: 0; }
  .sidebar.collapsed .user-pill { justify-content: center; padding: 10px 6px; }
  .sidebar.collapsed .user-pill > div { display: none; }

  .sidebar-toggle {
    position: absolute; top: 20px; right: -14px; z-index: 200;
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--primary); border: 2px solid var(--surface);
    color: #fff; font-size: 12px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(93,135,255,0.4);
  }
  .sidebar-toggle:hover { background: var(--primary-dark); transform: scale(1.1); }

  .sidebar-logo {
    padding: 24px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: var(--primary);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
    box-shadow: 0 4px 12px rgba(93,135,255,0.4);
  }
  .logo-icon svg { width: 22px; height: 22px; fill: #fff; }

  .logo-mark {
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
    line-height: 1;
  }
  .logo-mark span { color: var(--primary); }

  .logo-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.38);
    margin-top: 3px;
    font-weight: 400;
  }

  .sidebar-nav {
    padding: 14px 12px;
    flex: 1;
  }

  .nav-section-label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 1.4px;
    color: rgba(255,255,255,0.28);
    padding: 12px 10px 6px;
    font-weight: 600;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    border-radius: 8px;
    cursor: pointer;
    color: rgba(255,255,255,0.55);
    font-size: 13.5px;
    font-weight: 500;
    transition: all 0.15s;
    margin-bottom: 3px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .nav-item:hover {
    color: #fff;
    background: rgba(255,255,255,0.08);
  }
  .nav-item.active {
    color: var(--primary);
    background: rgba(93,135,255,0.14);
    font-weight: 600;
  }
  .nav-item.active .nav-icon { color: var(--primary); }

  .nav-icon {
    font-size: 20px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
    line-height: 1;
    color: inherit;
  }
  /* Material Icons in nav */
  .nav-icon.material-icons-round {
    font-size: 20px;
    width: 22px;
  }

  .sidebar-footer {
    padding: 14px;
    border-top: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  .user-pill {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.07);
    cursor: pointer;
    transition: background 0.15s;
  }
  .user-pill:hover { background: rgba(255,255,255,0.11); }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(93,135,255,0.3);
  }

  .user-name { font-size: 13px; color: rgba(255,255,255,0.85); font-weight: 600; }
  .user-role {
    font-size: 11px; color: rgba(255,255,255,0.38);
    text-transform: capitalize; margin-top: 1px;
  }

  /* logout btn */
  .logout-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,0.3); padding: 4px;
    border-radius: 6px; transition: all 0.15s; margin-left: auto; flex-shrink: 0;
  }
  .logout-btn:hover { color: var(--error); background: rgba(250,137,107,0.12); }

  /* ── Main area ─────────────────────────────────────────────── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .topbar {
    height: var(--topbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    flex-shrink: 0;
    box-shadow: 0 1px 0 var(--border), 0 4px 12px rgba(42,53,71,0.05);
  }

  .topbar-title {
    font-size: 18px; font-weight: 700; flex: 1;
    color: var(--text); letter-spacing: -0.3px;
  }
  .topbar-title .page-sub {
    font-size: 13px; color: var(--text3); font-weight: 400; margin-left: 10px;
  }

  /* breadcrumb */
  .breadcrumb {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text3);
  }
  .breadcrumb-sep { color: var(--border2); }
  .breadcrumb-cur { color: var(--text2); font-weight: 500; }

  .page-content {
    flex: 1; overflow-y: auto; padding: 28px;
  }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    border-radius: 8px;
    font-family: var(--font); font-size: 13.5px; font-weight: 600;
    cursor: pointer; border: 1.5px solid transparent;
    transition: all 0.15s; white-space: nowrap;
    letter-spacing: 0.1px; line-height: 1.4;
  }
  .btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .btn-primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 3px 12px rgba(93,135,255,0.35);
  }
  .btn-primary:hover:not(:disabled) {
    background: var(--primary-dark);
    border-color: var(--primary-dark);
    box-shadow: 0 4px 16px rgba(93,135,255,0.45);
    transform: translateY(-1px);
  }
  .btn-primary:active { transform: translateY(0); box-shadow: 0 2px 6px rgba(93,135,255,0.3); }

  .btn-secondary {
    background: var(--surface); color: var(--text2);
    border-color: var(--border2);
    box-shadow: 0 1px 4px rgba(42,53,71,0.06);
  }
  .btn-secondary:hover:not(:disabled) { background: var(--bg2); border-color: var(--text3); color: var(--text); }

  .btn-ghost {
    background: transparent; color: var(--text2); border-color: transparent;
  }
  .btn-ghost:hover { background: var(--bg2); color: var(--text); }

  .btn-success {
    background: var(--success); color: #fff; border-color: var(--success);
    box-shadow: 0 3px 12px rgba(19,222,185,0.3);
  }
  .btn-success:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

  .btn-warning {
    background: var(--warning); color: #fff; border-color: var(--warning);
    box-shadow: 0 3px 12px rgba(255,174,31,0.3);
  }

  .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
  .btn-xs { padding: 4px 9px; font-size: 11.5px; border-radius: 5px; }

  .btn-danger {
    background: var(--error-light); color: var(--error);
    border-color: rgba(250,137,107,0.3);
  }
  .btn-danger:hover:not(:disabled) {
    background: rgba(250,137,107,0.2); border-color: var(--error);
  }

  /* icon button */
  .btn-icon {
    padding: 7px; border-radius: 8px; background: transparent;
    border: 1.5px solid var(--border); color: var(--text3);
    cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--bg2); color: var(--text2); border-color: var(--border2); }

  /* ── Cards ─────────────────────────────────────────────── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow);
  }
  .card-sm { padding: 16px 18px; }

  /* ── Stat / KPI cards ─────────────────────────────────────────────── */
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    position: relative;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

  .stat-card-icon {
    width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; margin-bottom: 14px;
    flex-shrink: 0;
  }

  .stat-label {
    font-size: 12px; font-weight: 600; color: var(--text3);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.6px;
  }

  .stat-value {
    font-size: 32px; font-weight: 700; color: var(--text);
    line-height: 1; margin-bottom: 6px; letter-spacing: -1px;
  }

  .stat-sub { font-size: 12px; color: var(--text3); }

  /* thin accent line on top of card */
  .stat-accent {
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  }

  /* ── Badges ─────────────────────────────────────────────── */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 600;
    white-space: nowrap; letter-spacing: 0.1px;
  }

  .badge-active   { background: var(--success-light); color: #0b9b85; }
  .badge-pending  { background: var(--warning-light);  color: #955c00; }
  .badge-expired  { background: var(--error-light);    color: #c0391e; }
  .badge-info     { background: var(--primary-light);  color: var(--primary-dark); }
  .badge-purple   { background: var(--purple-light);   color: var(--purple); }
  .badge-gray     { background: var(--bg3);            color: var(--text2); }

  /* ── Tables ─────────────────────────────────────────────── */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-lg); border: 1px solid var(--border); }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 13px 16px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text3);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    white-space: nowrap;
  }
  thead tr:first-child th:first-child { border-radius: var(--radius-lg) 0 0 0; }
  thead tr:first-child th:last-child  { border-radius: 0 var(--radius-lg) 0 0; }

  tbody td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    vertical-align: middle;
    color: var(--text);
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--bg); }

  /* ── Forms ─────────────────────────────────────────────── */
  .form-group { margin-bottom: 18px; }
  .form-row { display: grid; gap: 16px; margin-bottom: 18px; }
  .form-row-2 { grid-template-columns: 1fr 1fr; }
  .form-row-3 { grid-template-columns: 1fr 1fr 1fr; }

  label {
    display: block;
    font-size: 12px; font-weight: 600;
    color: var(--text2); margin-bottom: 6px; letter-spacing: 0.1px;
  }

  input, select, textarea {
    width: 100%;
    padding: 9px 13px;
    border: 1.5px solid var(--border2);
    border-radius: 8px;
    font-family: var(--font); font-size: 13.5px;
    color: var(--text); background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none; line-height: 1.5;
  }
  input:hover, select:hover, textarea:hover { border-color: var(--text3); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(93,135,255,0.14);
  }
  input::placeholder { color: var(--text3); }
  textarea { resize: vertical; min-height: 80px; }

  .input-hint { font-size: 11.5px; color: var(--text3); margin-top: 5px; }

  /* Search input */
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 38px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 18px; pointer-events: none;
  }

  /* ── Tabs ─────────────────────────────────────────────── */
  .tabs {
    display: flex; gap: 0;
    border-bottom: 2px solid var(--border); margin-bottom: 24px;
  }
  .tab {
    padding: 11px 20px; font-size: 13.5px; font-weight: 500;
    color: var(--text3); cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.15s; font-family: var(--font);
    border-radius: 8px 8px 0 0;
  }
  .tab:hover { color: var(--text2); background: var(--bg); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 700; }

  /* ── Modals ─────────────────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(42,53,71,0.5);
    backdrop-filter: blur(4px);
    z-index: 1000; display: flex;
    align-items: flex-start; justify-content: center;
    padding: 32px 20px; overflow-y: auto;
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius-xl);
    width: 100%; max-width: 640px;
    max-height: calc(100vh - 64px);
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg); flex-shrink: 0;
    border: 1px solid var(--border);
    animation: slideIn 0.2s ease forwards;
  }

  .modal-header { flex-shrink: 0; }
  .modal-footer { flex-shrink: 0; }
  .modal-body { padding: 22px 26px; overflow-y: auto; flex: 1; }

  .modal-lg { max-width: 880px; }
  .modal-xl { max-width: 1120px; }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 26px 18px;
    border-bottom: 1px solid var(--border);
    border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  }

  .modal-title { font-size: 17px; font-weight: 700; color: var(--text); }

  .modal-footer {
    padding: 16px 26px;
    border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 10px;
    background: var(--bg); border-radius: 0 0 var(--radius-xl) var(--radius-xl);
  }

  /* close btn */
  .modal-close {
    background: var(--bg); border: 1.5px solid var(--border);
    color: var(--text3); border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
    transition: all 0.15s; flex-shrink: 0;
  }
  .modal-close:hover { background: var(--error-light); color: var(--error); border-color: rgba(250,137,107,0.4); }

  /* ── Filter chips ─────────────────────────────────────────────── */
  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 5px 12px; border-radius: 20px; font-size: 12.5px;
    cursor: pointer; border: 1.5px solid var(--border);
    background: var(--surface); color: var(--text2);
    transition: all 0.15s; font-family: var(--font); font-weight: 500;
  }
  .chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
  .chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* ── Alert rows ─────────────────────────────────────────────── */
  .alert-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px; border: 1px solid;
    margin-bottom: 8px; font-size: 13px; font-weight: 500;
  }
  .alert-row.warning { background: var(--warning-light); border-color: rgba(255,174,31,0.3); color: #955c00; }
  .alert-row.danger  { background: var(--error-light);   border-color: rgba(250,137,107,0.3); color: #c0391e; }
  .alert-row.info    { background: var(--primary-light); border-color: rgba(93,135,255,0.25); color: var(--primary-dark); }

  /* ── Misc utilities ─────────────────────────────────────────────── */
  .divider { height: 1px; background: var(--border); margin: 18px 0; }
  .text-muted { color: var(--text3); }
  .text-sm { font-size: 12px; }
  .mono { font-family: var(--font-mono); }
  .flex { display: flex; }
  .flex-center { display: flex; align-items: center; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .gap-4 { gap: 16px; }
  .mb-4 { margin-bottom: 16px; }
  .mb-6 { margin-bottom: 24px; }

const fmt = (n) => n ? Number(n).toLocaleString('en-IN') : '—';
const pct = (n, d) => d > 0 ? ((n/d)*100).toFixed(1) + '%' : '—';
const uid = () => Math.random().toString(36).slice(2,9);

// Nepali BS fiscal year → AD equivalent (BS - 57)
function fyToAD(fy) {
  if (!fy) return '';
  const parts = fy.split('/');
  if (parts.length !== 2) return '';
  const y1 = parseInt(parts[0]);
  if (isNaN(y1)) return '';
  const ad1 = y1 - 57;
  const ad2 = ad1 + 1;
  return `${ad1}/${String(ad2).slice(-2)}`;
}

function DropdownPanel({ anchor, search, setSearch, filtered, value, onChange, setOpen, onAddNew }) {
  const [pos, setPos] = React.useState({ top: 0, left: 0, width: 200 });
  React.useLayoutEffect(() => {
    if (anchor.current) {
      const r = anchor.current.getBoundingClientRect();
      setPos({ top: r.bottom + 2, left: r.left, width: r.width });
    }
  }, []);
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  const bg = isDark ? '#1e1e2e' : '#ffffff';
  const border = isDark ? '#3a3a4e' : '#d1d5db';
  const text1 = isDark ? '#e2e8f0' : '#1e293b';
  const text3 = isDark ? '#64748b' : '#94a3b8';
  const bg2 = isDark ? '#2a2a3e' : '#f1f5f9';
  return (
    <div onMouseDown={e => e.stopPropagation()} style={{position:'fixed', zIndex:99999, top:pos.top, left:pos.left, width:pos.width,
      background:bg, border:`1px solid ${border}`, borderRadius:6,
      boxShadow:'0 8px 32px rgba(0,0,0,0.32)', overflow:'hidden'}}>
      <div style={{padding:'6px 8px', borderBottom:`1px solid ${border}`}}>
        <input autoFocus value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search…" style={{width:'100%', border:'none', background:'transparent',
            outline:'none', fontSize:13, color:text1, boxSizing:'border-box'}}/>
      </div>
      <div style={{maxHeight:220, overflowY:'auto'}}>
        {filtered.length === 0
          ? <div style={{padding:'10px 12px', color:text3, fontSize:12}}>No results</div>
          : filtered.map(o => (
              <div key={o.value} onClick={() => { onChange(o.value); setOpen(false); }}
                style={{padding:'7px 12px', cursor:'pointer', fontSize:13,
                  color: o.value == value ? '#6366f1' : text1,
                  background: o.value == value ? 'rgba(99,102,241,0.1)' : 'transparent',
                  fontWeight: o.value == value ? 600 : 400}}
                onMouseEnter={e => e.currentTarget.style.background=bg2}
                onMouseLeave={e => e.currentTarget.style.background = o.value == value ? 'rgba(99,102,241,0.1)' : 'transparent'}>
                {o.label}
              </div>
            ))
        }
      </div>
      {onAddNew && search.trim() && filtered.length === 0 && (
        <div style={{padding:'6px 8px', borderTop:`1px solid ${border}`}}>
          <div onClick={() => { onAddNew(search.trim()); setOpen(false); }}
            style={{padding:'6px 10px', cursor:'pointer', fontSize:12, color:'#6366f1', fontWeight:500,
              borderRadius:4, border:'1px dashed #6366f1', textAlign:'center'}}
            onMouseEnter={e=>e.currentTarget.style.background='rgba(99,102,241,0.08)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
            ＋ Add "{search.trim()}" as new occupation
          </div>
        </div>
      )}
    </div>
  );
}

function SearchableSelect({ value, onChange, options, placeholder = '— Select —', disabled = false, onAddNew }) {
  const [open, setOpen] = React.useState(false);
  const [search, setSearch] = React.useState('');
  const ref = React.useRef(null);

  React.useEffect(() => {
    if (!open) setSearch('');
  }, [open]);

  React.useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);

  const selected = options.find(o => o.value == value);
  const filtered = search
    ? options.filter(o => o.label.toLowerCase().includes(search.toLowerCase()))
    : options;

  return (
    <div ref={ref} style={{position:'relative'}}>
      <button type="button" disabled={disabled} onClick={() => !disabled && setOpen(o => !o)}
        style={{width:'100%', textAlign:'left', padding:'6px 10px', background:'var(--bg2)',
          border:'1px solid var(--border)', borderRadius:6, color: selected ? 'var(--text1)' : 'var(--text3)',
          cursor: disabled ? 'not-allowed' : 'pointer', fontSize:13, display:'flex',
          justifyContent:'space-between', alignItems:'center', minHeight:34}}>
        <span style={{overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', flex:1}}>
          {selected ? selected.label : placeholder}
        </span>
        <span style={{marginLeft:6, color:'var(--text3)', fontSize:10, flexShrink:0}}>{open ? '▲' : '▼'}</span>
      </button>
      {open && ReactDOM.createPortal(
        <DropdownPanel
          anchor={ref}
          search={search}
          setSearch={setSearch}
          filtered={filtered}
          value={value}
          onChange={onChange}
          setOpen={setOpen}
          onAddNew={onAddNew}
        />,
        document.body
      )}
    </div>
  );
}

// ─── PAGINATION ───────────────────────────────────────────────────────────────

function usePagination(items, pageSize = 12) {
  const [page, setPage] = useState(1);
  // Reset to page 1 whenever items change (search/filter applied)
  useEffect(() => { setPage(1); }, [items.length]);
  const totalPages = Math.max(1, Math.ceil(items.length / pageSize));
  const start = (page - 1) * pageSize;
  const paged = items.slice(start, start + pageSize);
  return { paged, page, setPage, totalPages, total: items.length, start, end: Math.min(start + pageSize, items.length) };
}

function Pagination({ page, setPage, totalPages, total, start, end, label = 'items' }) {
  if (totalPages <= 1) return null;

  const pages = [];
  const delta = 2;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= page - delta && i <= page + delta)) {
      pages.push(i);
    } else if (pages[pages.length - 1] !== '...') {
      pages.push('...');
    }
  }

  return (
    <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:18, paddingTop:14, borderTop:'1px solid var(--border)'}}>
      <span style={{fontSize:12.5, color:'var(--text3)'}}>
        Showing <strong style={{color:'var(--text2)'}}>{start + 1}–{end}</strong> of <strong style={{color:'var(--text2)'}}>{total}</strong> {label}
      </span>
      <div style={{display:'flex', gap:5, alignItems:'center'}}>
        <button className="btn btn-secondary btn-sm" onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}
          style={{display:'flex', alignItems:'center', gap:3}}>
          <span className="material-icons-round" style={{fontSize:14}}>chevron_left</span> Prev
        </button>
        {pages.map((p, i) =>
          p === '...'
            ? <span key={`e${i}`} style={{padding:'0 4px', color:'var(--text3)', fontSize:13}}>…</span>
            : <button key={p} className="btn btn-sm" onClick={() => setPage(p)}
                style={{
                  minWidth:34, padding:'5px 8px',
                  background: p === page ? 'var(--primary)' : 'var(--surface)',
                  color: p === page ? '#fff' : 'var(--text2)',
                  border: `1.5px solid ${p === page ? 'var(--primary)' : 'var(--border)'}`,
                  fontWeight: p === page ? 700 : 400,
                  boxShadow: p === page ? '0 2px 8px rgba(93,135,255,0.3)' : 'none',
                }}>{p}</button>
        )}
        <button className="btn btn-secondary btn-sm" onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}
          style={{display:'flex', alignItems:'center', gap:3}}>
          Next <span className="material-icons-round" style={{fontSize:14}}>chevron_right</span>
        </button>
      </div>
    </div>
  );
}

function StatusBadge({status}) {
  const cls = status === 'Active' ? 'badge-active' : status === 'Pending Renewal' ? 'badge-pending' : 'badge-expired';
  return <span className={`badge ${cls}`}>{status}</span>;
}

function getClient(clients, id) {
  return clients.find(c => c.id === id) || {};
}

function getOccupation(id) {
  const rawId = typeof id === 'string' && id.startsWith('c:') ? parseInt(id.slice(2)) : id;
  return OCCUPATIONS.find(o => o.id === rawId) || {};
}

// All districts flat list for cross-province search
const ALL_DISTRICTS = PROVINCES.flatMap(p => p.districts.map(d => ({province: p.name, district: d.name})));

function DistrictMultiPicker({onAdd, buttonLabel='+ Add districts'}) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState([]); // [{province, district}]
  const [browseProvince, setBrowseProvince] = useState('');

  const isSelected = (province, district) => selected.some(s => s.province===province && s.district===district);
  const toggle = (province, district) => setSelected(s =>
    isSelected(province, district)
      ? s.filter(x => !(x.province===province && x.district===district))
      : [...s, {province, district}]
  );

  const filteredDistricts = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (q) return ALL_DISTRICTS.filter(d => d.district.toLowerCase().includes(q) || d.province.toLowerCase().includes(q));
    if (browseProvince) return ALL_DISTRICTS.filter(d => d.province === browseProvince);
    return ALL_DISTRICTS;
  }, [search, browseProvince]);

  const handleAdd = () => {
    if (!selected.length) return;
    onAdd(selected.map(d => ({province: d.province, district: d.district, localLevel:'', localLevelType:''})));
    setSelected([]); setSearch(''); setOpen(false);
  };

  if (!open) return (
    <button onClick={()=>setOpen(true)} style={{fontSize:11,color:'var(--blue)',background:'none',border:'none',cursor:'pointer',padding:0}}>{buttonLabel}</button>
  );

  return (
    <div style={{background:'var(--bg1)', border:'1px solid var(--accent)', borderRadius:8, padding:'10px 12px', marginTop:4, width:'100%'}}>
      <div style={{display:'flex', gap:6, alignItems:'center', marginBottom:8}}>
        <input value={search} onChange={e=>{setSearch(e.target.value);setBrowseProvince('');}}
          placeholder="Search districts across all provinces…" style={{flex:1, fontSize:12}}/>
        <select value={browseProvince} onChange={e=>{setBrowseProvince(e.target.value);setSearch('');}} style={{fontSize:12, padding:'4px 6px'}}>
          <option value="">All provinces</option>
          {PROVINCES.map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
        </select>
        {selected.length > 0 && <button className="btn btn-primary btn-sm" onClick={handleAdd}>Add {selected.length}</button>}
        <button onClick={()=>{setOpen(false);setSelected([]);setSearch('');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14,flexShrink:0}}>✕</button>
      </div>
      {selected.length > 0 && (
        <div style={{display:'flex', flexWrap:'wrap', gap:4, marginBottom:8}}>
          {selected.map(s => (
            <span key={s.province+s.district} onClick={()=>toggle(s.province,s.district)}
              style={{fontSize:11, padding:'2px 8px', borderRadius:10, background:'var(--accent)', color:'#fff', cursor:'pointer'}}>
              {s.district} ✕
            </span>
          ))}
        </div>
      )}
      <div style={{display:'flex', flexWrap:'wrap', gap:5, maxHeight:180, overflowY:'auto'}}>
        {filteredDistricts.map(d => (
          <button key={d.province+d.district} onClick={()=>toggle(d.province,d.district)}
            style={{fontSize:11, padding:'3px 8px', borderRadius:10, border:'1px solid var(--border)',
              background: isSelected(d.province,d.district) ? 'var(--accent)' : 'var(--bg2)',
              color: isSelected(d.province,d.district) ? '#fff' : 'var(--text1)', cursor:'pointer'}}>
            {d.district}{!browseProvince && !search && <span style={{fontSize:9, opacity:0.6, marginLeft:3}}>{d.province.split(' ')[0]}</span>}
          </button>
        ))}
      </div>
    </div>
  );
}

      />
      {value && !open && district && (
        <button onClick={e=>{e.stopPropagation(); onChange('',''); setQ('');}} style={{position:'absolute',right:6,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--text3)',fontSize:14,padding:0,lineHeight:1}}>✕</button>
      )}
      {open && district && ReactDOM.createPortal(
        <DropdownPanel anchor={ref} search={q} setSearch={setQ}
          filtered={filtered.map(l=>({value:l.name, label:l.name+' ('+l.type+')'}))}
          value={value||''}
          onChange={v=>{ const ll=allLL.find(l=>l.name===v); onChange(v, ll?.type||''); setOpen(false); setQ(''); }}
          setOpen={setOpen}
        />, document.body
      )}
    </div>
  );
}

function QuickAddOccupationModal({name, onSave, onClose}) {
  const token = getSession()?.token;
  const [form, setForm] = useState({name: name||'', sector: SECTORS[0]||'', level:''});
  const set = (k,v) => setForm(f=>({...f,[k]:v}));
  const handleSave = async () => {
    if (!form.name.trim() || !form.sector) return alert('Name and sector are required.');
    try {
      const saved = await api('POST', '/occupations', {name:form.name, sector:form.sector, level:form.level||null}, token);
      OCCUPATIONS.push(saved);
      OCCUPATIONS.sort((a,b)=>a.name.localeCompare(b.name));
      onSave(saved);
    } catch(e) { alert(e.message); }
  };
  return (
    <Modal title={`Add new occupation`} onClose={onClose}
      footer={<><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={handleSave}>Save &amp; select</button></>}>
      <div className="form-row form-row-2">
        <div className="form-group"><label>Name *</label>
          <input value={form.name} onChange={e=>set('name',e.target.value)}/>
        </div>
        <div className="form-group"><label>Sector *</label>
          <select value={form.sector} onChange={e=>set('sector',e.target.value)}>
            {SECTORS.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
      </div>
      <div className="form-group"><label>Level (optional)</label>
        <select value={form.level} onChange={e=>set('level',e.target.value)}>
          <option value="">— Not specified —</option>
          <option>Level 1</option><option>Level 2</option><option>Level 3</option><option>Professional</option>
        </select>
      </div>
    </Modal>
  );
}

// ─── CLIENT DOCUMENTS ────────────────────────────────────────────────────────

function ClientDocuments({ client, instituteId, token, canEdit, isAdmin }) {
  const [docs, setDocs] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [uploading, setUploading] = React.useState(false);
  const [expanded, setExpanded] = React.useState(false);
  const fileRef = React.useRef(null);

  const loadDocs = () => {
    const params = `institute_id=${instituteId}${client.id ? `&client_id=${client.id}` : ''}`;
    api('GET', `/documents?${params}`, null, token)
      .then(d => { setDocs(d); setLoading(false); })
      .catch(() => setLoading(false));
  };

  React.useEffect(() => { if (expanded) loadDocs(); }, [expanded]);

  const handleUpload = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      // Step 1: get presigned URL
      const { upload_url, key } = await api('POST', '/documents/presign', {
        file_name: file.name,
        content_type: file.type,
        institute_id: instituteId,
        client_id: client.id || null,
      }, token);
      // Step 2: upload directly to R2
      const r = await fetch(upload_url, { method: 'PUT', body: file, headers: { 'Content-Type': file.type } });
      if (!r.ok) throw new Error('Upload to storage failed');
      // Step 3: save metadata
      await api('POST', '/documents', {
        institute_id: instituteId,
        client_id: client.id || null,
        client_name: client.fullName,
        file_name: file.name,
        file_key: key,
        file_size: file.size,
        content_type: file.type,
      }, token);
      loadDocs();
    } catch(err) { alert('Upload failed: ' + err.message); }
    finally { setUploading(false); e.target.value = ''; }
  };

  const deleteDoc = async (doc) => {
    if (!confirm(`Delete "${doc.file_name}"?`)) return;
    try {
      await api('DELETE', `/documents/${doc.id}`, null, token);
      setDocs(d => d.filter(x => x.id !== doc.id));
    } catch(err) { alert(err.message); }
  };

  const fmtSize = (b) => b ? (b > 1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB') : '';

  return (
    <div className="card" style={{marginBottom:12, padding:0}}>
      <button style={{width:'100%', background:'none', border:'none', cursor:'pointer', padding:'14px 18px', display:'flex', alignItems:'center', gap:12, textAlign:'left', fontFamily:'var(--font)'}}
        onClick={() => setExpanded(x => !x)}>
        <span style={{fontSize:18}}>🤝</span>
        <div style={{flex:1}}>
          <div style={{fontWeight:600, fontSize:14, color:'var(--text)'}}>{client.name}</div>
          <div style={{fontSize:12, color:'var(--text3)', marginTop:1}}>{client.fullName !== client.name ? client.fullName + ' · ' : ''}{client.type} · {client.assignmentCount} assignment{client.assignmentCount!==1?'s':''}</div>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:8}}>
          {!loading && expanded && <span className="badge badge-info">{docs.length} file{docs.length!==1?'s':''}</span>}
          <span style={{color:'var(--text3)', fontSize:12}}>{expanded ? '▲' : '▼'}</span>
        </div>
      </button>

      {expanded && (
        <div style={{borderTop:'1px solid var(--border)', padding:'12px 18px'}}>
          {loading
            ? <div style={{color:'var(--text3)', fontSize:13, padding:'8px 0'}}>Loading…</div>
            : docs.length === 0
              ? <div style={{color:'var(--text3)', fontSize:13, padding:'8px 0', fontStyle:'italic'}}>No documents uploaded yet.</div>
              : docs.map(doc => (
                <div key={doc.id} style={{display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:20}}>{doc.content_type?.includes('pdf') ? '📄' : doc.content_type?.startsWith('image') ? '🖼' : '📎'}</span>
                  <div style={{flex:1, minWidth:0}}>
                    <div style={{fontSize:13, fontWeight:500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{doc.file_name}</div>
                    <div style={{fontSize:11, color:'var(--text3)'}}>{fmtSize(doc.file_size)} · {new Date(doc.uploaded_at).toLocaleDateString()}</div>
                  </div>
                  <div style={{display:'flex', gap:6, flexShrink:0}}>
                    {doc.url && <a href={doc.url} target="_blank" rel="noreferrer" className="btn btn-ghost btn-sm">👁 View</a>}
                    {(canEdit || isAdmin) && <button className="btn btn-danger btn-sm" onClick={()=>deleteDoc(doc)}>🗑</button>}
                  </div>
                </div>
              ))
          }
          {canEdit && (
            <div style={{marginTop:10}}>
              <input ref={fileRef} type="file" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx" style={{display:'none'}} onChange={handleUpload}/>
              <button className="btn btn-secondary btn-sm" onClick={()=>fileRef.current?.click()} disabled={uploading}>
                {uploading ? '⏳ Uploading…' : '📎 Upload experience letter'}
              </button>
              <span style={{fontSize:11, color:'var(--text3)', marginLeft:10}}>PDF, image, or Word document</span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function InstituteDetail({institute, clients, onUpdateClients, onBack, onUpdate, onRefresh, onDelete, token, isAdmin, isEditor, jumpToTab, onBulkAdd, onAddNSTB}) {
  const [tab, setTab] = useState(jumpToTab || 'profile');
  const [modal, setModal] = useState(null);
  const [saving, setSaving] = useState(false);
  // Writers (admin + editor) can add/edit; viewers are read-only.
  const canEdit = !!(isAdmin || isEditor);

  useEffect(() => { if(jumpToTab) setTab(jumpToTab); }, [jumpToTab]);

  // Unique clients for this institute derived from experience
  const instituteClients = React.useMemo(() => {
    const seen = new Map();
    for (const exp of institute.experience) {
      const id = exp.clientId || ('manual:' + exp.clientName);
      if (!seen.has(id)) {
        const c = exp.clientId ? clients.find(c => c.id === exp.clientId) : null;
        seen.set(id, {
          id: exp.clientId || null,
          name: c ? (c.shortName || c.fullName) : (exp.clientName || '—'),
          fullName: c ? c.fullName : (exp.clientName || '—'),
          type: c ? c.type : '—',
          assignmentCount: 0,
        });
      }
      seen.get(id).assignmentCount++;
    }
    return [...seen.values()].sort((a,b)=>a.name.localeCompare(b.name));
  }, [institute.experience, clients]);

  const tabs = [
    {id:'profile', label:'Profile'},
    {id:'experience', label:`Experience (${institute.experience.length})`},
    {id:'clients', label:`Clients (${instituteClients.length})`},
    {id:'nstb', label:`NSTB (${institute.nstb.length})`},
    {id:'tax', label:`Tax Clearance (${institute.taxClearance.length})`},
    {id:'affiliation', label:`CTEVT Affiliation (${institute.affiliation.length})`},
  ];

  const withSave = (fn) => async (...args) => {
    setSaving(true);
    try { await fn(...args); } catch(err) { alert(err.message); } finally { setSaving(false); }
  };

  const saveProfile = withSave(async (form) => {
    await api('PUT', `/institutes/${institute.id}`, instToAPI(form), token);
    await onRefresh(institute.id);
    setModal(null);
  });

  const saveClientToMaster = async (form) => {
    const created = await api('POST', '/clients', clientToAPI(form), token);
    const newClient = normClient(created);
    if (onUpdateClients) onUpdateClients([...clients, newClient]);
    return newClient;
  };

  const saveExperience = withSave(async (form) => {
    if(!form.manualClient && !form.clientId) { alert('Please select a client or use manual entry.'); return; }
    if(form.manualClient && !form.clientName?.trim()) { alert('Please enter a client name.'); return; }
    if(!form.assignmentName.trim()) { alert('Assignment name is required.'); return; }
    if(form.id) {
      await api('PUT', `/assignments/${form.id}`, expToAPI(form, institute.id), token);
    } else {
      await api('POST', '/assignments', expToAPI(form, institute.id), token);
    }
    await onRefresh(institute.id);
    setModal(null);
  });

  const deleteExperience = withSave(async (id) => {
    if(!window.confirm('Delete this assignment? This cannot be undone.')) return;
    await api('DELETE', `/assignments/${id}`, null, token);
    await onRefresh(institute.id);
  });

  const saveNSTB = withSave(async (formOrArray) => {
    if (Array.isArray(formOrArray)) {
      await Promise.all(formOrArray.map(f => api('POST', '/nstb', nstbToAPI(f, institute.id), token)));
    } else if (formOrArray.id) {
      await api('PUT', `/nstb/${formOrArray.id}`, nstbToAPI(formOrArray, institute.id), token);
    } else {
      await api('POST', '/nstb', nstbToAPI(formOrArray, institute.id), token);
    }
    await onRefresh(institute.id);
    setModal(null);
  });

  const deleteNSTB = withSave(async (id) => {
    if(!window.confirm('Delete this NSTB record?')) return;
    await api('DELETE', `/nstb/${id}`, null, token);
    await onRefresh(institute.id);
  });

  const saveTax = withSave(async (form) => {
    if(!form.fy) { alert('Fiscal year is required.'); return; }
    if(!form.turnover || !form.taxableIncome || !form.taxPaid) { alert('Turnover, Taxable Income and Tax Paid are required.'); return; }
    if(form.id) {
      await api('PUT', `/tax/${form.id}`, taxToAPI(form, institute.id), token);
    } else {
      await api('POST', '/tax', taxToAPI(form, institute.id), token);
    }
    await onRefresh(institute.id);
    setModal(null);
  });

  const deleteTax = withSave(async (id) => {
    if(!window.confirm('Delete this tax clearance record?')) return;
    await api('DELETE', `/tax/${id}`, null, token);
    await onRefresh(institute.id);
  });

  const saveAffiliation = withSave(async (form) => {
    if(!form.affiliationDate) { alert('Affiliation date is required.'); return; }
    if(form.id) {
      await api('PUT', `/affiliations/${form.id}`, affToAPI(form, institute.id), token);
    } else {
      await api('POST', '/affiliations', affToAPI(form, institute.id), token);
    }
    await onRefresh(institute.id);
    setModal(null);
  });

  const deleteAffiliation = withSave(async (id) => {
    if(!window.confirm('Delete this affiliation record?')) return;
    await api('DELETE', `/affiliations/${id}`, null, token);
    await onRefresh(institute.id);
  });

  // Group by FY
  const groupByFY = (items, key='fy') => {
    const groups = {};
    items.forEach(item => {
      const fy = item[key] || 'Unknown';
      if(!groups[fy]) groups[fy] = [];
      groups[fy].push(item);
    });
    return Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0]));
  };

  const [expandedFY, setExpandedFY] = useState({});
  const toggleFY = (fy) => setExpandedFY(e => ({...e, [fy]: !e[fy]}));
  const [expClientFilter, setExpClientFilter] = useState('');
  const [expViewMode, setExpViewMode] = useState('fy'); // 'fy' | 'client'

  // Auto-expand all FY/client groups when institute loads or experience changes,
  // so users don't see a "blank" Experience tab with collapsed groups.
  useEffect(() => {
    const fyKeys = (institute.experience || []).map(e => 'exp-' + e.fy);
    const clientKeys = (institute.experience || []).map(e => 'client-' + (e.clientId || ('manual:' + (e.clientName || 'Unknown'))));
    setExpandedFY(prev => {
      const next = { ...prev };
      [...fyKeys, ...clientKeys].forEach(k => { if (!(k in next)) next[k] = true; });
      return next;
    });
  }, [institute.id, institute.experience.length]);

  return (
    <div className="fade-in">
      {/* Header */}
      <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:20}}>
        <button className="btn btn-ghost btn-sm" onClick={onBack}>← Back</button>
        <div style={{flex:1}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            {institute.logo && <img src={institute.logo} alt="" style={{width:40, height:40, objectFit:'contain', borderRadius:6, border:'1px solid var(--border)', background:'#fff', padding:3}}/>}
            <h2 style={{fontSize:18, fontWeight:600}}>{institute.name}</h2>
            {institute.acronym && <span className="badge badge-purple" style={{fontSize:12, fontFamily:'var(--font-mono)'}}>{institute.acronym}</span>}
            <StatusBadge status={institute.status}/>
            {!canEdit && <span className="badge badge-gray" title="Your role does not have edit permission" style={{fontSize:10}}>👁 Read-only</span>}
          </div>
          <div style={{fontSize:12, color:'var(--text3)', marginTop:2}}>
            Reg: {institute.regNo} &nbsp;·&nbsp; PAN: {institute.pan}
          </div>
        </div>
        {canEdit && <button className="btn btn-secondary btn-sm" onClick={()=>setModal({type:'editInstitute'})}>✏ Edit profile</button>}
        {isAdmin && <button className="btn btn-danger btn-sm" onClick={()=>setModal({type:'deleteInstitute'})}>🗑 Delete</button>}
      </div>

      {/* Tabs */}
      <div className="tabs">
        {tabs.map(t=><button key={t.id} className={`tab ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}</button>)}
      </div>

      {/* Profile tab */}
      {tab==='profile' && (
        <div className="grid-2">
          <div className="card">
            <div className="section-title">Identity</div>
            {[
              ['Institute name', institute.name],
              ['Acronym / Short name', institute.acronym || '—'],
              ['Registration no.', institute.regNo],
              ['Registration date', institute.regDate],
              ['PAN / VAT', institute.pan],
              ['Permanent account no.', institute.permanentAccountNo],
              ['Institute type', institute.type],
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--border)', fontSize:13}}>
                <span style={{color:'var(--text3)'}}>{k}</span>
                <span style={{fontWeight:500}}>{v||'—'}</span>
              </div>
            ))}
          </div>
          <div className="card">
            <div className="section-title">Contact & Status</div>
            {[
              ['Contact person', institute.contactPerson],
              ['Phone', institute.phone],
              ['Email', institute.email],
              ['Website', institute.website ? <a href={institute.website} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>{institute.website}</a> : null],
              ['Location', (institute.latitude && institute.longitude)
                ? <span style={{display:'flex', alignItems:'center', gap:8, flexWrap:'wrap'}}>
                    <span style={{fontFamily:'var(--font-mono)', fontSize:12}}>{parseFloat(institute.latitude).toFixed(6)}, {parseFloat(institute.longitude).toFixed(6)}</span>
                    {institute.googleMapLink
                      ? <a href={institute.googleMapLink} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>📍 Google Maps</a>
                      : <a href={`https://www.google.com/maps?q=${institute.latitude},${institute.longitude}`} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>📍 Google Maps</a>}
                  </span>
                : institute.googleMapLink
                  ? <a href={institute.googleMapLink} target="_blank" rel="noreferrer" style={{color:'var(--accent)'}}>📍 View on Google Maps</a>
                  : null],
              ['Address', institute.address],
              ['Status', <StatusBadge status={institute.status}/>],
              ['Renewal due', institute.renewalDue],
              ['Remarks', institute.remarks],
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex', justifyContent:'space-between', padding:'8px 0', borderBottom:'1px solid var(--border)', fontSize:13, alignItems:'center'}}>
                <span style={{color:'var(--text3)'}}>{k}</span>
                <span style={{fontWeight:500, textAlign:'right', maxWidth:220}}>{v||'—'}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Experience tab */}
      {tab==='experience' && (
        <>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12, gap:8, flexWrap:'wrap'}}>
            <div style={{display:'flex', gap:6, alignItems:'center'}}>
              {/* View mode toggle */}
              <div style={{display:'flex', borderRadius:6, border:'1px solid var(--border)', overflow:'visible'}}>
                <button onClick={()=>setExpViewMode('fy')} style={{fontSize:12, padding:'5px 14px', whiteSpace:'nowrap', background: expViewMode==='fy' ? 'var(--accent)' : 'var(--bg2)', color: expViewMode==='fy' ? '#fff' : 'var(--text2)', border:'none', cursor:'pointer', borderRadius:'5px 0 0 5px'}}>By FY</button>
                <button onClick={()=>setExpViewMode('client')} style={{fontSize:12, padding:'5px 14px', whiteSpace:'nowrap', background: expViewMode==='client' ? 'var(--accent)' : 'var(--bg2)', color: expViewMode==='client' ? '#fff' : 'var(--text2)', border:'none', cursor:'pointer', borderLeft:'1px solid var(--border)', borderRadius:'0 5px 5px 0'}}>By Client</button>
              </div>
              {/* Client filter — works in both modes */}
              <select value={expClientFilter} onChange={e=>setExpClientFilter(e.target.value)} style={{fontSize:12, padding:'4px 8px', borderRadius:6, border:'1px solid var(--border)', background:'var(--bg2)', color:'var(--text1)', minWidth:160}}>
                <option value="">All clients</option>
                {[...new Map(institute.experience.filter(e=>e.clientId).map(e=>[e.clientId, getClient(clients,e.clientId)])).values()].filter(c=>c.id).map(c=>(
                  <option key={c.id} value={c.id}>{c.shortName||c.fullName}</option>
                ))}
              </select>
            </div>
            {canEdit && <div style={{display:'flex', gap:6}}>
              <button className="btn btn-secondary btn-sm" onClick={onBulkAdd}>⊞ Bulk add</button>
              <button className="btn btn-primary btn-sm" onClick={()=>setModal({type:'addExp'})}>+ Add assignment</button>
            </div>}
          </div>

          {institute.experience.length > 0 && (() => {
            const exps = institute.experience;
            const totalAssignments = exps.length;
            const totalTrained = exps.reduce((s,e)=>s+e.occupations.reduce((ss,o)=>ss+(parseInt(o.trainees)||0),0),0);
            const totalDistricts = new Set(exps.flatMap(e=>e.occupations.flatMap(o=>(o.locations||[]).map(l=>l.district).filter(Boolean)))).size;
            const uniqueClients = new Set(exps.map(e=>e.clientId||('m:'+e.clientName)).filter(Boolean)).size;
            const statStyle = {textAlign:'center', flex:1};
            const numStyle = {fontWeight:700, fontSize:20, fontFamily:'var(--font-mono)', color:'var(--accent)'};
            const lblStyle = {fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.5px', marginTop:2};
            return (
              <div style={{display:'flex', gap:0, background:'var(--bg2)', borderRadius:8, border:'1px solid var(--border)', marginBottom:12, padding:'10px 0'}}>
                {[['Clients', uniqueClients, 'var(--blue)'],['Assignments', totalAssignments,'var(--accent)'],['Trainees trained', totalTrained.toLocaleString(),'var(--accent)'],['Districts', totalDistricts,'var(--purple)']].map(([lbl,val,col],i,arr)=>(
                  <React.Fragment key={lbl}>
                    <div style={statStyle}>
                      <div style={{...numStyle,color:col}}>{val}</div>
                      <div style={lblStyle}>{lbl}</div>
                    </div>
                    {i<arr.length-1 && <div style={{width:1,background:'var(--border)',margin:'0 4px'}}/>}
                  </React.Fragment>
                ))}
              </div>
            );
          })()}
          {institute.experience.length === 0
            ? <div className="empty-state"><div className="empty-state-icon">📋</div><div className="empty-state-title">No assignments yet</div><div className="empty-state-sub">Add the first experience / assignment record</div></div>
            : expViewMode === 'fy'
              ? groupByFY(institute.experience.filter(e=>!expClientFilter || String(e.clientId)===String(expClientFilter))).map(([fy, items]) => (
                <div key={fy} className="fy-group">
                  <button className="fy-header" onClick={()=>toggleFY('exp-'+fy)}>
                    <span>{expandedFY['exp-'+fy] ? '▼' : '▶'}</span>
                    <span>FY {fy}{fyToAD(fy) ? <span style={{color:'var(--text3)',fontWeight:400,fontSize:'0.88em'}}> ({fyToAD(fy)})</span> : ''}</span>
                    <span className="badge badge-info" style={{marginLeft:'auto'}}>{items.length} assignment{items.length>1?'s':''}</span>
                  </button>
                  {expandedFY['exp-'+fy] && (
                    <div className="fy-body">
                      {items.map(exp => <ExpCard key={exp.id} exp={exp} clients={clients} showFY={false} setModal={setModal} deleteExperience={deleteExperience} canEdit={canEdit} isAdmin={isAdmin}/>)}
                    </div>
                  )}
                </div>
              ))
              : (() => {
                  // Group by client
                  const clientMap = new Map();
                  institute.experience.forEach(exp => {
                    const key = exp.clientId || ('manual:' + (exp.clientName||'Unknown'));
                    if (!clientMap.has(key)) clientMap.set(key, []);
                    clientMap.get(key).push(exp);
                  });
                  return [...clientMap.entries()].map(([key, exps]) => {
                    const client = getClient(clients, exps[0].clientId);
                    const clientLabel = client.shortName || client.fullName || exps[0].clientName || 'Unknown client';
                    const totalT = exps.reduce((s,e)=>s+e.occupations.reduce((ss,o)=>ss+(parseInt(o.trainees)||0),0),0);
                    const fys = [...new Set(exps.map(e=>e.fy))].sort();
                    return (
                      <div key={key} className="fy-group">
                        <button className="fy-header" onClick={()=>toggleFY('client-'+key)}>
                          <span>{expandedFY['client-'+key] ? '▼' : '▶'}</span>
                          <span style={{fontWeight:600}}>{clientLabel}</span>
                          <div style={{display:'flex', gap:6, marginLeft:'auto', alignItems:'center'}}>
                            <span className="badge badge-gray" style={{fontSize:10}}>{fys[0]}{fys.length>1?` – ${fys[fys.length-1]}`:''}</span>
                            <span className="badge badge-info">{exps.length} assignment{exps.length>1?'s':''}</span>
                            <span className="badge badge-active" style={{fontSize:10}}>{totalT.toLocaleString()} trainees</span>
                          </div>
                        </button>
                        {expandedFY['client-'+key] && (
                          <div className="fy-body">
                            {exps.sort((a,b)=>a.fy.localeCompare(b.fy)).map(exp => <ExpCard key={exp.id} exp={exp} clients={clients} showFY={true} setModal={setModal} deleteExperience={deleteExperience} canEdit={canEdit} isAdmin={isAdmin}/>)}
                          </div>
                        )}
                      </div>
                    );
                  });
                })()
          }
        </>
      )}

      {/* NSTB tab */}
      {tab==='nstb' && (
        <>
          {canEdit && <div style={{display:'flex', justifyContent:'flex-end', marginBottom:12}}>
            <button className="btn btn-primary btn-sm" onClick={onAddNSTB}>+ Add NSTB records</button>
          </div>}
          {institute.nstb.length > 0 && (() => {
            const totA = institute.nstb.reduce((s,r)=>s+(parseInt(r.applied)||0),0);
            const totAp = institute.nstb.reduce((s,r)=>s+(parseInt(r.appeared)||0),0);
            const totP = institute.nstb.reduce((s,r)=>s+(parseInt(r.pass)||0),0);
            const passRate = totAp > 0 ? ((totP/totAp)*100).toFixed(1)+'%' : '—';
            const numStyle = {fontWeight:700, fontSize:20, fontFamily:'var(--font-mono)', color:'var(--accent)'};
            const lblStyle = {fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.5px', marginTop:2};
            return (
              <div style={{display:'flex', gap:0, background:'var(--bg2)', borderRadius:8, border:'1px solid var(--border)', marginBottom:12, padding:'10px 0'}}>
                {[['Applied', totA,'var(--accent)'],['Appeared', totAp,'var(--blue)'],['Pass', totP,'var(--green,#22c55e)'],['Pass rate', passRate,'var(--purple)']].map(([lbl,val,col],i,arr)=>(
                  <React.Fragment key={lbl}>
                    <div style={{textAlign:'center',flex:1}}>
                      <div style={{...numStyle,color:col}}>{val}</div>
                      <div style={lblStyle}>{lbl}</div>
                    </div>
                    {i<arr.length-1 && <div style={{width:1,background:'var(--border)',margin:'0 4px'}}/>}
                  </React.Fragment>
                ))}
              </div>
            );
          })()}
          {institute.nstb.length === 0
            ? <div className="empty-state"><div className="empty-state-icon">📝</div><div className="empty-state-title">No NSTB records yet</div></div>
            : groupByFY(institute.nstb).map(([fy, items]) => (
              <div key={fy} className="fy-group">
                <button className="fy-header" onClick={()=>toggleFY('nstb-'+fy)}>
                  <span>{expandedFY['nstb-'+fy] ? '▼' : '▶'}</span>
                  <span>FY {fy}{fyToAD(fy) ? <span style={{color:'var(--text3)',fontWeight:400,fontSize:'0.88em'}}> ({fyToAD(fy)})</span> : ''}</span>
                  <div style={{marginLeft:'auto', display:'flex', gap:8}}>
                    <span className="badge badge-info">Applied: {items.reduce((s,i)=>s+i.applied,0)}</span>
                    <span className="badge badge-active">Pass: {items.reduce((s,i)=>s+i.pass,0)}</span>
                  </div>
                </button>
                {expandedFY['nstb-'+fy] && (
                  <div className="table-wrap">
                    <table>
                      <thead><tr>
                        <th>Occupation</th><th>Level</th><th>Applied</th><th>Appeared</th><th>Pass</th>
                        <th>Appear rate</th><th>Pass rate</th><th>Letter</th><th></th>
                      </tr></thead>
                      <tbody>
                        {items.map(r=>(
                          <tr key={r.id}>
                            <td><strong>{r.occupation}</strong></td>
                            <td><span className="badge badge-purple">{r.level}</span></td>
                            <td className="mono">{r.applied}</td>
                            <td className="mono">{r.appeared}</td>
                            <td className="mono">{r.pass}</td>
                            <td><span className="badge badge-info">{pct(r.appeared, r.applied)}</span></td>
                            <td><span className={`badge ${parseFloat(pct(r.pass,r.appeared))>=70?'badge-active':'badge-pending'}`}>{pct(r.pass, r.appeared)}</span></td>
                            <td className="text-sm text-muted">{r.letterNo}</td>
                            <td style={{display:'flex', gap:4}}>
                              {canEdit && <button className="btn btn-ghost btn-sm" onClick={()=>setModal({type:'editNSTB', data:r})}>✏</button>}
                              {isAdmin && <button className="btn btn-danger btn-sm" onClick={()=>deleteNSTB(r.id)}>🗑</button>}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            ))
          }
        </>
      )}

      {/* Tax tab */}
      {tab==='tax' && (
        <>
          <div style={{display:'flex', justifyContent:'flex-end', marginBottom:12}}>
            {canEdit && <button className="btn btn-primary btn-sm" onClick={()=>setModal({type:'addTax'})}>+ Add tax clearance</button>}
          </div>
          {institute.taxClearance.length === 0
            ? <div className="empty-state"><div className="empty-state-icon">🧾</div><div className="empty-state-title">No tax clearance records</div></div>
            : (
              <div className="card" style={{padding:0, overflow:'hidden'}}>
                <table>
                  <thead><tr>
                    <th>Fiscal year</th><th>Total turnover (NPR)</th><th>Taxable income (NPR)</th>
                    <th>Tax paid (NPR)</th><th>Certificate date</th><th>Kar Chukta No.</th><th></th>
                  </tr></thead>
                  <tbody>
                    {institute.taxClearance.slice().sort((a,b)=>b.fy.localeCompare(a.fy)).map(t=>(
                      <tr key={t.id}>
                        <td><strong>{t.fy}</strong>{fyToAD(t.fy) && <span style={{color:'var(--text3)',fontWeight:400,fontSize:'0.85em'}}> ({fyToAD(t.fy)})</span>}</td>

                        <td className="mono">{fmt(t.taxableIncome)}</td>
                        <td className="mono">{fmt(t.taxPaid)}</td>

                          {isAdmin && <button className="btn btn-danger btn-sm" onClick={()=>deleteTax(t.id)}>🗑</button>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )

        </>

            {canEdit && <button className="btn btn-primary btn-sm" onClick={()=>setModal({type:'addAffiliation'})}>+ Add affiliation</button>}
          </div>
          {institute.affiliation.length === 0
            ? <div className="empty-state"><div className="empty-state-icon">📜</div><div className="empty-state-title">No CTEVT affiliations</div></div>

              <div key={aff.id} className="fy-group" style={{marginBottom:8}}>
                <button className="fy-header" onClick={()=>toggleFY('aff-'+aff.id)}>
                  <span>{expandedFY['aff-'+aff.id] ? '▼' : '▶'}</span>
                  <span>{aff.type}</span>
                  {(aff.chalaniNo || aff.patraNo) && (
                    <span style={{fontSize:11, color:'var(--text3)', fontFamily:'var(--font-mono)'}}>
                      Aff. No: {aff.chalaniNo || aff.patraNo}
                    </span>
                  )}
                  <span style={{fontSize:12, color:'var(--text3)', marginLeft:8}}>{aff.affiliationDate} → {aff.expiryDate}</span>
                  <span className={`badge ${aff.status==='Active'?'badge-active':aff.status==='Expired'?'badge-expired':'badge-pending'}`} style={{marginLeft:'auto'}}>{aff.status}</span>
                  <span className="badge badge-gray" style={{marginLeft:8}}>{aff.programs.length} programs</span>
                  {canEdit && <button className="btn btn-ghost btn-sm" style={{marginLeft:8}} onClick={e=>{e.stopPropagation();setModal({type:'editAffiliation',data:aff});}}>✏</button>}
                  {isAdmin && <button className="btn btn-danger btn-sm" style={{marginLeft:4}} onClick={e=>{e.stopPropagation();deleteAffiliation(aff.id);}}>🗑</button>}
                </button>

                  <div className="table-wrap">
                    <table>

                      <tbody>

      )}

      {/* Modals */}
      {modal?.type === 'editInstitute' && <InstituteForm institute={institute} onSave={saveProfile} onClose={()=>setModal(null)}/>}
      {modal?.type === 'deleteInstitute' && ReactDOM.createPortal(

// ─── SUMMARY VIEW ─────────────────────────────────────────────────────────────

function SummaryView({institutes, clients}) {
  const [selectedInst, setSelectedInst] = useState('');
  const [selectedFYs, setSelectedFYs] = useState([]);
  const [selectedOccs, setSelectedOccs] = useState([]);
  const [selectedClientTypes, setSelectedClientTypes] = useState([]);
  const [fullInst, setFullInst] = useState(null);
  const [loadingInst, setLoadingInst] = useState(false);

  const institute = fullInst || institutes.find(i=>i.id===parseInt(selectedInst));

  React.useEffect(() => {
    if (!selectedInst) { setFullInst(null); return; }
    setLoadingInst(true);
    api('GET', `/institutes/${selectedInst}`, null, getSession()?.token)
      .then(data => { setFullInst(normInst(data)); setLoadingInst(false); })
      .catch(() => setLoadingInst(false));
  }, [selectedInst]);

  const [occSearch, setOccSearch] = useState('');
  const [minDuration, setMinDuration] = useState('');

  const toggleFY = (fy) => setSelectedFYs(s => s.includes(fy) ? s.filter(f=>f!==fy) : [...s, fy]);
  const toggleOcc = (o) => setSelectedOccs(s => s.includes(o) ? s.filter(x=>x!==o) : [...s, o]);
  const toggleCT = (t) => setSelectedClientTypes(s => s.includes(t) ? s.filter(x=>x!==t) : [...s, t]);

  // Build summary rows
  const summaryRows = useMemo(() => {
    if(!institute) return [];
    const rows = {};

    // Experience
    institute.experience.filter(exp => {
      const fyMatch = selectedFYs.length === 0 || selectedFYs.includes(exp.fy);
      const client = getClient(clients, exp.clientId);
      const ctMatch = selectedClientTypes.length === 0 || selectedClientTypes.includes(client.type);
      return fyMatch && ctMatch;
    }).forEach(exp => {
      const client = getClient(clients, exp.clientId);
      exp.occupations.forEach(occ => {
        if(minDuration && (parseInt(occ.duration)||0) < parseInt(minDuration)) return;
        const ctevtOcc = getOccupation(occ.ctevtOccupationId);
        const occName = ctevtOcc.name || occ.nameInLetter;
        if(selectedOccs.length > 0 && !selectedOccs.includes(occName)) return;

        const key = `${occName}`;
        if(!rows[key]) {
          rows[key] = {
            occupation: occName,
            sector: ctevtOcc.sector || '—',
            level: occ.level || ctevtOcc.level || '—',
            clientIds: new Set(), clientNames: new Set(), clientTypes: new Set(),
            trainees: 0, stAppeared: 0, stPass: 0, hasOptional: false,
            districts: new Set(),
            nstbApplied: 0, nstbAppeared: 0, nstbPass: 0,
            nstbLevel: '—', affiliationStatus: '—', affiliationFrom: '—', affiliationTo: '—'
          };
        }
        const r = rows[key];
        r.clientIds.add(exp.clientId);
        r.clientNames.add(client.shortName || client.fullName);
        r.clientTypes.add(client.type);
        r.trainees += parseInt(occ.trainees)||0;
        if(occ.skillTestAppeared) { r.stAppeared += parseInt(occ.skillTestAppeared)||0; r.hasOptional = true; }
        if(occ.skillTestPass) { r.stPass += parseInt(occ.skillTestPass)||0; }
        (occ.locations||[]).forEach(l => { if(l.district) r.districts.add(l.district); });
      });
    });

    // NSTB
    institute.nstb.filter(n => selectedFYs.length === 0 || selectedFYs.includes(n.fy)).forEach(n => {
      const occName = n.occupation;
      if(!occName) return;
      if(selectedOccs.length > 0 && !selectedOccs.some(o => o.includes(occName) || occName.includes(o.split(',')[0]))) return;
      const matchKey = Object.keys(rows).find(k => k.toLowerCase().includes(occName.toLowerCase()) || occName.toLowerCase().includes(k.split(',')[0].toLowerCase()));
      const key = matchKey || occName;
      if(!rows[key]) {
        rows[key] = {
          occupation: occName, sector: '—',
          clientIds: new Set(), clientNames: new Set(), clientTypes: new Set(),
          trainees: 0, stAppeared: 0, stPass: 0, hasOptional: false,
          districts: new Set(),
          nstbApplied: 0, nstbAppeared: 0, nstbPass: 0,
          nstbLevel: '—', affiliationStatus: '—', affiliationFrom: '—', affiliationTo: '—'
        };
      }
      rows[key].nstbApplied += n.applied||0;
      rows[key].nstbAppeared += n.appeared||0;
      rows[key].nstbPass += n.pass||0;
      rows[key].nstbLevel = n.level;
    });

    // Affiliation
    Object.keys(rows).forEach(key => {
      const aff = institute.affiliation.find(a => (a.programs||[]).some(p => p.name && p.name.toLowerCase().includes(key.split(',')[0].toLowerCase())));
      if(aff) {
        rows[key].affiliationStatus = aff.status;
        rows[key].affiliationFrom = aff.affiliationDate;
        rows[key].affiliationTo = aff.expiryDate;
      }
    });

    return Object.values(rows);
  }, [institute, selectedFYs, selectedOccs, selectedClientTypes, minDuration, clients]);

  // Available occupations from selected institute
  const availableOccs = useMemo(() => {
    if(!institute) return [];
    const occs = new Set();
    institute.experience.forEach(exp => exp.occupations.forEach(occ => {
      const ctevtOcc = getOccupation(occ.ctevtOccupationId);
      occs.add(ctevtOcc.name || occ.nameInLetter);
    }));
    return [...occs];
  }, [institute]);

  return (
    <div className="fade-in" style={{display:'flex', gap:20, alignItems:'flex-start'}}>
      {/* Filter panel */}
      <div className="filter-panel">
        <div className="filter-panel-header">
          <span style={{fontSize:14}}>⚙</span>
          <span className="filter-panel-header-title">Filters</span>
          {(selectedFYs.length > 0 || selectedOccs.length > 0 || selectedClientTypes.length > 0 || minDuration) && (
            <span style={{marginLeft:'auto', background:'var(--accent)', color:'#fff', borderRadius:10, fontSize:10, fontWeight:700, padding:'1px 7px'}}>
              {selectedFYs.length + selectedOccs.length + selectedClientTypes.length + (minDuration?1:0)}
            </span>
          )}
        </div>
        <div className="filter-panel-body">

          <div className="filter-section">
            <div className="filter-label">Institute</div>
            <select value={selectedInst} onChange={e=>setSelectedInst(e.target.value)} style={{width:'100%'}}>
              <option value="">— Select —</option>
              {institutes.map(i=><option key={i.id} value={i.id}>{i.acronym || i.name}</option>)}
            </select>
          </div>

          <div className="filter-section">
            <div className="filter-label">Fiscal year</div>
            <div className="multi-select-list">
              {FISCAL_YEARS.slice().reverse().slice(0,15).map(fy=>(
                <label key={fy} className="multi-select-item">
                  <input type="checkbox" checked={selectedFYs.includes(fy)} onChange={()=>toggleFY(fy)}/>
                  {fy}
                </label>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <div className="filter-label">Occupation</div>
            <input value={occSearch} onChange={e=>setOccSearch(e.target.value)} placeholder="Search…"
              style={{width:'100%', fontSize:12, padding:'5px 8px', marginBottom:6, boxSizing:'border-box'}}/>
            <div className="multi-select-list">
              {availableOccs.filter(o=>!occSearch||o.toLowerCase().includes(occSearch.toLowerCase())).map(o=>(
                <label key={o} className="multi-select-item">
                  <input type="checkbox" checked={selectedOccs.includes(o)} onChange={()=>toggleOcc(o)}/>
                  <span style={{fontSize:11, lineHeight:1.3}}>{o}</span>
                </label>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <div className="filter-label">Client type</div>
            {CLIENT_TYPES.map(t=>(
              <label key={t} className="multi-select-item">
                <input type="checkbox" checked={selectedClientTypes.includes(t)} onChange={()=>toggleCT(t)}/>
                {t}
              </label>
            ))}
          </div>

          <div className="filter-section">
            <div className="filter-label">Min. training duration</div>
            {[['', 'All durations'], ['160', '160+ hrs'], ['390', '390+ hrs']].map(([val, label]) => (
              <label key={val} className="multi-select-item">
                <input type="radio" name="summ-duration" checked={minDuration === val} onChange={()=>setMinDuration(val)}/>
                {label}
              </label>
            ))}
          </div>

        </div>
        <button className="filter-reset-btn" onClick={()=>{setSelectedFYs([]);setSelectedOccs([]);setSelectedClientTypes([]);setMinDuration('');}}>
          ↺ Reset filters
        </button>
      </div>

      {/* Results */}
      <div style={{flex:1, minWidth:0}}>
        {loadingInst ? (
          <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
            <div className="empty-state-icon">⏳</div>
            <div className="empty-state-title">Loading institute data…</div>
          </div>
        ) : !institute ? (
          <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
            <div className="empty-state-icon">📊</div>
            <div className="empty-state-title">Select an institute to view summary</div>
            <div className="empty-state-sub">Choose an institute from the filter panel, then select fiscal years and occupations</div>
          </div>
        ) : (
          <>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <div style={{fontWeight:600, fontSize:15}}>{institute.name}</div>
                  {institute.acronym && <span className="badge badge-purple" style={{fontFamily:'var(--font-mono)', fontSize:11}}>{institute.acronym}</span>}
                </div>
                <div style={{fontSize:12, color:'var(--text3)'}}>
                  {selectedFYs.length > 0 ? `FY: ${selectedFYs.join(', ')}` : 'All fiscal years'}
                </div>
              </div>
              <div style={{marginLeft:'auto', display:'flex', gap:8}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>exportSummaryToCSV(institute, summaryRows, selectedFYs)}>↓ Export CSV</button>
              </div>
            </div>

            {/* Turnover summary */}
            {(() => {
              const taxRows = institute.taxClearance.filter(t => selectedFYs.length === 0 || selectedFYs.includes(t.fy));
              if (!taxRows.length) return null;
              const total = taxRows.reduce((s, t) => s + (parseInt(t.turnover) || 0), 0);
              const avg = Math.round(total / taxRows.length);
              return (
                <div style={{display:'flex', gap:12, marginBottom:16, flexWrap:'wrap'}}>
                  {taxRows.map(t => (
                    <div key={t.fy} style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 16px', minWidth:180}}>
                      <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:3}}>Turnover {t.fy}</div>
                      <div style={{fontWeight:700, fontFamily:'var(--font-serif)', fontSize:16}}>NPR {fmt(t.turnover)}</div>

                    <div style={{background:'var(--accent)', borderRadius:8, padding:'10px 16px', minWidth:180}}>
                      <div style={{fontSize:10, color:'rgba(255,255,255,0.75)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:3}}>Avg annual turnover ({taxRows.length} FYs)</div>
                      <div style={{fontWeight:700, fontFamily:'var(--font-serif)', fontSize:16, color:'#fff'}}>NPR {fmt(avg)}</div>
                    </div>

            {summaryRows.length === 0 ? (
              <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
