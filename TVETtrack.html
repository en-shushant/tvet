          {isEdit && (
            <div className="form-row">
              <div className="form-group">
                <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13 }}>
                  <input type="checkbox" checked={form.is_active} onChange={e => setForm(f=>({...f,is_active:e.target.checked}))} />
                  Account active
                </label>
              </div>
            </div>
          )}
          {err && <div style={{ color: 'var(--red)', fontSize: 12, margin: '8px 0' }}>{err}</div>}
          <div style={{ display: 'flex', gap: 8, justifyContent: 'flex-end', marginTop: 16 }}>
            <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>{saving ? 'Saving…' : 'Save'}</button>
          </div>
        </div>
      </div>
    </div>,
    document.body
  );
}

function UserManagement({institutes, isSuperAdmin}) {
  const token = getSession()?.token;
  const [users, setUsers] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [modal, setModal] = React.useState(null);
  const [assignModal, setAssignModal] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const [userInstitutes, setUserInstitutes] = React.useState({});

  const loadUserInstitutes = (userList) => {
    const editors = userList.filter(u => u.role === 'editor');
    editors.forEach(u => {
      api('GET', `/users/${u.id}/institutes`, null, token)
        .then(ids => setUserInstitutes(prev => ({ ...prev, [u.id]: ids.map(id => parseInt(id)) })))
        .catch(() => {});
    });
  };

  const reload = () => {
    setLoading(true);
    api('GET', '/users', null, token)
      .then(rows => { setUsers(rows); setLoading(false); loadUserInstitutes(rows); })
      .catch(() => setLoading(false));
  };
  React.useEffect(reload, []);

  const roleBadge = (role) => {
    if (role === 'superadmin') return <span className="badge badge-purple">⭐ Superadmin</span>;
    if (role === 'admin') return <span className="badge badge-purple" style={{opacity:0.8}}>👑 Admin</span>;
    if (role === 'editor') return <span className="badge badge-active">✏ Editor</span>;
    return <span className="badge badge-info">👁 Viewer</span>;
  };

  const [actionErr, setActionErr] = React.useState('');
  const toggleActive = async (u) => {
    setActionErr('');
    try {
      await api('PUT', `/users/${u.id}`, { name: u.name, email: u.email, role: u.role, is_active: !u.is_active, photo: u.photo || null }, token);
      reload();
    } catch(e) { setActionErr(e.message); }
  };

  const deleteUser = async (u) => {
    if (!confirm(`Delete ${u.name}? This cannot be undone.`)) return;
    setActionErr('');
    try {
      await api('DELETE', `/users/${u.id}`, null, token);
      reload();
    } catch(e) { setActionErr(e.message); }
  };

  const filtered = users.filter(u =>
    !search ||
    u.name.toLowerCase().includes(search.toLowerCase()) ||
    u.email.toLowerCase().includes(search.toLowerCase())
  );

  return (
    <div>
      {actionErr && <ErrorBanner msg={actionErr} onDismiss={()=>setActionErr('')}/>}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <div className="search-wrap" style={{ flex: 1, maxWidth: 300 }}>
          <span className="search-icon">🔍</span>
          <input className="search-input" placeholder="Search users…" value={search} onChange={e => setSearch(e.target.value)} />
        </div>
        <button className="btn btn-primary btn-sm" onClick={() => setModal('add')}>+ Add user</button>
      </div>
      <div className="card" style={{ padding: 0 }}>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Name</th><th>Email</th><th>Role</th><th>Assigned Firms</th><th>Status</th><th>Created</th><th></th>
              </tr>
            </thead>
            <tbody>
              {loading
                ? <tr><td colSpan="7" style={{textAlign:'center',padding:20,color:'var(--text3)'}}>Loading…</td></tr>
                : filtered.map(u => {
                const assignedInsts = u.role === 'editor'
                  ? (userInstitutes[u.id] || []).map(id => institutes.find(i => i.id === id)).filter(Boolean)
                  : [];
                return (
                <tr key={u.id}>
                  <td>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      {u.photo
                        ? <img src={u.photo} alt="" style={{width:32,height:32,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
                        : <div style={{width:32,height:32,borderRadius:'50%',background:'#3D7A54',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:600,color:'#fff',flexShrink:0}}>{u.name.slice(0,2).toUpperCase()}</div>
                      }
                      <span style={{fontWeight:500}}>{u.name}</span>
                    </div>
                  </td>
                  <td style={{ fontFamily: 'var(--font-mono)', fontSize: 12, color: 'var(--text2)' }}>{u.email}</td>
                  <td>{roleBadge(u.role)}</td>
                  <td>
                    {u.role === 'editor' ? (
                      <div style={{display:'flex',flexWrap:'wrap',gap:4,alignItems:'center'}}>
                        {assignedInsts.length === 0
                          ? <span style={{fontSize:12,color:'var(--text3)'}}>None</span>
                          : assignedInsts.map(i => (
                              <span key={i.id} title={i.name} style={{fontSize:11,fontWeight:700,fontFamily:'var(--font-mono)',
                                background:'color-mix(in srgb, var(--primary) 12%, transparent)',
                                color:'var(--primary)',borderRadius:4,padding:'2px 6px'}}>
                                {i.acronym || i.name.slice(0,6)}
                              </span>
                            ))
                        }
                      </div>
                    ) : <span style={{color:'var(--text3)',fontSize:12}}>—</span>}
                  </td>
                  <td><span className={`badge ${u.is_active ? 'badge-active' : 'badge-gray'}`}>{u.is_active ? 'Active' : 'Inactive'}</span></td>
                  <td style={{ color: 'var(--text3)', fontSize: 12 }}>{u.created_at?.slice(0,10)}</td>
                  <td>
                    <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
                      {u.role === 'editor' && (
                        <button className="btn btn-secondary btn-sm" onClick={() => setAssignModal(u)}>
                          <span className="material-icons-round" style={{fontSize:13,verticalAlign:'middle',marginRight:3}}>business</span>
                          Assign Firms
                        </button>
                      )}
                      <button className="btn btn-ghost btn-sm" onClick={() => setModal(u)}>Edit</button>
                      <button className={`btn btn-sm ${u.is_active ? 'btn-danger' : 'btn-secondary'}`}
                        onClick={() => toggleActive(u)}>
                        {u.is_active ? 'Deactivate' : 'Activate'}
                      </button>
                      {isSuperAdmin && <button className="btn btn-danger btn-sm" onClick={() => deleteUser(u)}>🗑</button>}
                    </div>
                  </td>
                </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {modal === 'add' && <UserModal institutes={institutes} isSuperAdmin={isSuperAdmin} onSave={()=>{setModal(null);reload();}} onClose={() => setModal(null)} />}
      {modal && modal !== 'add' && <UserModal user={modal} institutes={institutes} isSuperAdmin={isSuperAdmin} onSave={()=>{setModal(null);reload();}} onClose={() => setModal(null)} />}
      {assignModal && <AssignFirmsModal user={assignModal} institutes={institutes}
        onSave={(ids) => { setUserInstitutes(prev => ({...prev, [assignModal.id]: ids})); setAssignModal(null); }}
        onClose={() => setAssignModal(null)} />}
    </div>
  );
}

const INST_KEY = 'tvettrack_institutes';
const CLIENT_KEY = 'tvettrack_clients';

function loadData(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : fallback;
  } catch { return fallback; }
}

function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) { console.error('Storage error', e); }
}

function App() {
  const [session, setSession] = useState(() => getSession());

  // Hash-based routing: #screen or #detail/instituteId
  const parseHash = () => {
    const h = window.location.hash.replace('#','');
    if (!h) return { screen: 'dashboard', instId: null };
    const parts = h.split('/');
    return { screen: parts[0] || 'dashboard', instId: parts[1] || null };
  };
  const [screen, setScreen] = useState(() => parseHash().screen);
  const [selectedInstitute, setSelectedInstitute] = useState(null);
  const [bulkAddInstitute, setBulkAddInstitute] = useState(null);
  const [nstbAddInstitute, setNstbAddInstitute] = useState(null);
  const [institutes, setInstitutes] = useState([]);
  const [clients, setClients] = useState([]);
  const [loading, setLoading] = useState(false);
  const [apiError, setApiError] = useState('');
  const [showAddInstitute, setShowAddInstitute] = useState(false);
  const [globalSearch, setGlobalSearch] = useState('');
  const [searchFocused, setSearchFocused] = useState(false);
  const [jumpToTab, setJumpToTab] = useState(null);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [showChangePwd, setShowChangePwd] = useState(false);


  const isSuperAdmin = session?.role === 'superadmin';
  const isAdmin = session?.role === 'admin' || isSuperAdmin;
  const isEditor = session?.role === 'editor';

  const token = session?.token;

  // Clear sessions from old localStorage format (no JWT token)
  useEffect(() => {
    if (session && !session.token) {
      clearSession();
      setSession(null);
    }
  }, []);

  // Listen for session-expired events from the api() helper (401 responses)
  useEffect(() => {
    const handler = () => {
      setSession(null);
      setApiError('Your session expired. Please sign in again.');
    };
    window.addEventListener('tvettrack:session-expired', handler);
    return () => window.removeEventListener('tvettrack:session-expired', handler);
  }, []);

  // Load institutes and clients from API on mount
  useEffect(() => {
    if (!session || !token) return;
    setLoading(true);
    setApiError('');
    Promise.all([
      api('GET', '/institutes', null, token),
      api('GET', '/clients', null, token),
      api('GET', '/occupations', null, token).catch(() => []),
    ]).then(([insts, cls, occs]) => {
      setInstitutes(insts.map(normInst));
      setClients(cls.map(normClient));
      OCCUPATIONS.splice(0, OCCUPATIONS.length, ...occs);
      setLoading(false);
    }).catch(err => {
      setApiError(err.message);
      setLoading(false);
    });
  }, [session]);

  // Restore screen from hash on first load (e.g. after refresh)
  useEffect(() => {
    if (!session) return;
    const { screen: s, instId } = parseHash();
    if (s === 'detail' && instId) {
      api('GET', `/institutes/${instId}`, null, session.token)
        .then(full => { setSelectedInstitute(normInst(full)); setScreen('detail'); })
        .catch(() => { window.location.hash = 'institutes'; setScreen('institutes'); });
    } else if (s && s !== 'dashboard') {
      setScreen(s);
    }
  }, []);

  if (!session) {
    return <LoginPage onLogin={(s) => setSession(s)} />;
  }

  if (loading) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'var(--bg)'}}>
        <div style={{width:56,height:56,borderRadius:14,background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',boxShadow:'0 8px 24px rgba(93,135,255,0.35)'}}>
          <span className="material-icons-round spin" style={{fontSize:28,color:'#fff'}}>sync</span>
        </div>
        <div style={{fontSize:15,fontWeight:600,color:'var(--text2)'}}>Loading registry…</div>
        <div style={{fontSize:13,color:'var(--text3)'}}>Fetching institute data</div>
      </div>
    );
  }

  if (apiError) {
    return (
      <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16,background:'var(--bg)',padding:24}}>
        <div style={{width:64,height:64,borderRadius:16,background:'var(--error-light)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          <span className="material-icons-round" style={{fontSize:32,color:'var(--error)'}}>cloud_off</span>
        </div>
        <div style={{fontSize:18,fontWeight:700,color:'var(--text)'}}>Could not connect</div>
        <div style={{fontSize:13,color:'var(--text3)',maxWidth:380,textAlign:'center'}}>{apiError}</div>
        <div style={{display:'flex',gap:10,marginTop:4}}>
          <button className="btn btn-primary" onClick={() => { setApiError(''); setLoading(true); Promise.all([api('GET','/institutes',null,token),api('GET','/clients',null,token),api('GET','/occupations',null,token).catch(()=>[])]).then(([i,c,o])=>{setInstitutes(i.map(normInst));setClients(c.map(normClient));OCCUPATIONS.splice(0,OCCUPATIONS.length,...o);setLoading(false);}).catch(e=>{setApiError(e.message);setLoading(false);}); }}>
            <span className="material-icons-round" style={{fontSize:16}}>refresh</span> Retry
          </button>
          <button className="btn btn-secondary" onClick={() => { clearSession(); setSession(null); setApiError(''); }}>
            <span className="material-icons-round" style={{fontSize:16}}>logout</span> Sign out
          </button>
        </div>
        <div style={{fontSize:11.5,color:'var(--text3)',maxWidth:360,textAlign:'center'}}>
          Open DevTools (F12) → Console for details, or try disabling browser extensions.
        </div>
      </div>
    );
  }

  const handleLogout = () => {
    clearSession();
    setSession(null);
    window.location.hash = '';
    setScreen('dashboard');
  };

  const handleNavigate = (id) => {
    if ((id === 'master' || id === 'users') && !isAdmin) return;
    if ((id === 'summary' || id === 'comparison' || id === 'compliance') && isEditor) return;
    window.location.hash = id;
    setScreen(id);
    if (id !== 'institutes') setSelectedInstitute(null);
    setMobileSidebarOpen(false);
  };

  const navItems = [
    {id:'dashboard', icon:'dashboard', label:'Dashboard'},
    {id:'institutes', icon:'account_balance', label:'Institutes'},
    {id:'summary', icon:'bar_chart', label:'Summary View', editorHidden: true},
    {id:'comparison', icon:'compare_arrows', label:'Comparison', editorHidden: true},
    {id:'compliance', icon:'fact_check', label:'Project Compliance', editorHidden: true},
    {id:'master', icon:'category', label:'Master Data', adminOnly: true},
    {id:'users', icon:'manage_accounts', label:'User Management', adminOnly: true},
  ];

  const handleSelectInstitute = async (inst) => {
    try {
      const full = await api('GET', `/institutes/${inst.id}`, null, token);
      const normalized = normInst(full);
      setSelectedInstitute(normalized);
      setInstitutes(insts => insts.map(i => i.id === normalized.id ? normalized : i));
      window.location.hash = `detail/${inst.id}`;
      setScreen('detail');
    } catch (err) {
      setApiError('Failed to load institute: ' + err.message);
    }
  };

  const handleRefreshInstitute = async (id) => {
    try {
      const full = await api('GET', `/institutes/${id}`, null, token);
      const normalized = normInst(full);
      setInstitutes(insts => insts.map(i => i.id === normalized.id ? normalized : i));
      setSelectedInstitute(normalized);
    } catch (err) {
      setApiError('Failed to refresh institute: ' + err.message);
    }
  };

  const handleUpdateInstitute = (updated) => {
    setInstitutes(insts => insts.map(i => i.id === updated.id ? updated : i));
    setSelectedInstitute(updated);
  };

  const handleAddInstitute = async (form) => {
    try {
      const created = await api('POST', '/institutes', instToAPI(form), token);
      const normalized = normInst(created);
      setInstitutes(i => [...i, {...normalized, experience:[], nstb:[], taxClearance:[], affiliation:[]}]);
      setShowAddInstitute(false);
    } catch (err) {
      setApiError('Failed to add institute: ' + err.message);
    }
  };

  const handleDeleteInstitute = (id) => {
    setInstitutes(insts => insts.filter(i => i.id !== id));
    setSelectedInstitute(null);
    window.location.hash = 'institutes';
    setScreen('institutes');
  };

  const handleUpdateClients = (updated) => setClients(updated);

  const pageTitles = {
    dashboard: 'Dashboard',
    institutes: 'Institutes',
    detail: selectedInstitute?.name,
    bulkAdd: 'Bulk Add Assignments',
    nstbAdd: 'Add NSTB Records',
    summary: 'Summary view',
    comparison: 'Comparison view',
    master: 'Master data',
    users: 'User management',
  };

  return (
    <div className="app-shell">
      {/* Sidebar */}

        </div>
        <nav className="sidebar-nav">
          <div className="nav-section-label">Main Menu</div>
          {navItems.filter(item => (!item.adminOnly || isAdmin) && (!item.editorHidden || !isEditor)).map(item => (
            <button
              key={item.id}
              className={`nav-item ${screen===item.id || (screen==='detail' && item.id==='institutes')?'active':''}`}
              onClick={() => handleNavigate(item.id)}
              title={sidebarCollapsed ? item.label : ''}
            >
              <span className="nav-icon material-icons-round">{item.icon}</span>
              <span className="nav-label">{item.label}</span>
            </button>
          ))}
          {(isAdmin||isEditor) && <div className="search-section" style={{padding:'0 2px', marginTop:8}}>
            <button className="nav-item sidebar-quick-btn"
              onClick={()=>{ window.location.hash='master'; setScreen('master'); setTimeout(()=>window.__masterOpenOccForm&&window.__masterOpenOccForm(), 100); }}
              title={sidebarCollapsed?'Add Occupation':''}>
              <span className="nav-icon material-icons-round" style={{fontSize:18}}>add_circle</span>
              <span className="nav-label">Add Occupation</span>
            </button>
          </div>}
          <div className="nav-section-label search-section" style={{marginTop:8}}>Quick Search</div>
          <div className="search-section" style={{padding:'0 2px', position:'relative'}}>
            <div className="search-wrap">
              <span className="material-icons-round search-icon" style={{fontSize:17, color:'rgba(255,255,255,0.35)'}}>search</span>
              <input
                className="sidebar-search-input"
                placeholder="Find institute..."
                value={globalSearch}
                onChange={e => setGlobalSearch(e.target.value)}
                onFocus={() => setSearchFocused(true)}
                onBlur={() => setTimeout(() => setSearchFocused(false), 200)}
              />
            </div>
            {searchFocused && globalSearch.length > 0 && (() => {
              const results = institutes.filter(i =>
                i.name.toLowerCase().includes(globalSearch.toLowerCase()) ||
                (i.acronym && i.acronym.toLowerCase().includes(globalSearch.toLowerCase())) ||
                i.regNo.toLowerCase().includes(globalSearch.toLowerCase()) ||
                (i.pan && i.pan.includes(globalSearch))
              ).slice(0, 6);
              return results.length > 0 ? (
                <div style={{
                  position:'absolute', top:'100%', left:4, right:4, zIndex:1000,
                  background:'var(--surface)', border:'1px solid var(--border)',
                  borderRadius:'var(--radius-lg)', boxShadow:'var(--shadow-md)',
                  overflow:'hidden', marginTop:4
                }}>
                  {results.map(inst => (
                    <div key={inst.id}
                      style={{padding:'10px 12px', cursor:'pointer', borderBottom:'1px solid var(--border)', transition:'background 0.1s'}}
                      onMouseOver={e => e.currentTarget.style.background='var(--bg2)'}
                      onMouseOut={e => e.currentTarget.style.background='transparent'}
                      onClick={() => { handleSelectInstitute(inst); setGlobalSearch(''); setSearchFocused(false); }}>
                      <div style={{display:'flex', alignItems:'center', gap:6}}>
                        {inst.acronym && <span style={{fontFamily:'var(--font-mono)', fontSize:10, color:'var(--accent)', background:'var(--accent-light)', padding:'1px 5px', borderRadius:3}}>{inst.acronym}</span>}
                        <span style={{fontSize:12, fontWeight:500, color:'var(--text)'}}>{inst.name}</span>
                      </div>
                      <div style={{fontSize:11, color:'var(--text3)', marginTop:2, display:'flex', gap:8}}>
                        <span>{inst.regNo}</span>
                        <StatusBadge status={inst.status}/>
                      </div>
                    </div>
                  ))}
                  <div style={{padding:'8px 12px', fontSize:11, color:'var(--text3)', textAlign:'center', cursor:'pointer', background:'var(--bg2)'}}
                    onClick={() => { window.location.hash='institutes'; setScreen('institutes'); setGlobalSearch(globalSearch); setSearchFocused(false); }}>
                    See all results →
                  </div>
                </div>
              ) : (
                <div style={{
                  position:'absolute', top:'100%', left:4, right:4, zIndex:1000,
                  background:'var(--surface)', border:'1px solid var(--border)',
                  borderRadius:'var(--radius-lg)', boxShadow:'var(--shadow-md)',
                  padding:'12px', fontSize:12, color:'var(--text3)', textAlign:'center', marginTop:4
                }}>No institutes found</div>
              );
            })()}
          </div>
        </nav>
        <div className="sidebar-footer">
          <div className="user-pill">
            {session.photo
              ? <img src={session.photo} alt="" style={{width:34,height:34,borderRadius:'50%',objectFit:'cover',flexShrink:0}}/>
              : <div className="user-avatar">{(session.fullName||session.email||'?').slice(0,2).toUpperCase()}</div>}
            {!sidebarCollapsed && (
              <div style={{flex:1, minWidth:0, overflow:'hidden'}}>
                <div className="user-name" style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{session.fullName||session.email}</div>
                <div className="user-role">{session.role}</div>
              </div>
            )}
            {!sidebarCollapsed && (
              <div style={{display:'flex',gap:2}}>
                <button className="logout-btn" title="Change password" onClick={()=>setShowChangePwd(true)}>
                  <span className="material-icons-round" style={{fontSize:18}}>lock</span>
                </button>
                <button className="logout-btn" title="Sign out" onClick={handleLogout}>
                  <span className="material-icons-round" style={{fontSize:18}}>logout</span>
                </button>
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main">
        <div className="topbar">
          <button className="topbar-hamburger" onClick={()=>setMobileSidebarOpen(o=>!o)}>
            <span className="material-icons-round" style={{fontSize:22}}>menu</span>
          </button>
          <div style={{flex:1}}>
            <div className="topbar-title">{pageTitles[screen]}</div>
            {screen === 'detail' && selectedInstitute && (
              <div className="breadcrumb" style={{marginTop:2}}>
                <span className="breadcrumb-sep">Institutes</span>
                <span className="material-icons-round breadcrumb-sep" style={{fontSize:14}}>chevron_right</span>
                <span className="breadcrumb-cur">{selectedInstitute.acronym || selectedInstitute.name}</span>
              </div>
            )}
          </div>
          {(screen === 'dashboard' || screen === 'institutes') && isAdmin && (
            <button className="btn btn-primary btn-sm" onClick={()=>setShowAddInstitute(true)}>
              <span className="material-icons-round" style={{fontSize:15}}>add</span>
              Add Institute
            </button>
          )}
          {screen === 'summary' && <span className="text-sm text-muted">Select institute and filters to generate report</span>}
          {screen === 'comparison' && <span className="text-sm text-muted">Select institutes to compare side by side</span>}
          {screen === 'compliance' && <span className="text-sm text-muted">Match firms to project criteria</span>}
          {/* User avatar chip in topbar */}
          <div style={{display:'flex',alignItems:'center',gap:10,marginLeft:8,paddingLeft:16,borderLeft:'1px solid var(--border)'}}>
            {session.photo
              ? <img src={session.photo} alt="" style={{width:34,height:34,borderRadius:'50%',objectFit:'cover'}}/>
              : <div style={{width:34,height:34,borderRadius:'50%',background:'var(--primary)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#fff',flexShrink:0}}>{(session.fullName||session.email||'?').slice(0,2).toUpperCase()}</div>}
            <div className="topbar-user-name" style={{display:'flex',flexDirection:'column',lineHeight:1.3}}>
              <span style={{fontSize:13,fontWeight:600,color:'var(--text)'}}>{session.fullName||session.email}</span>
              <span style={{fontSize:11,color:'var(--text3)',textTransform:'capitalize'}}>{session.role}</span>
            </div>
          </div>
        </div>

        <div className="page-content">
          {screen === 'dashboard' && <Dashboard institutes={institutes} isEditor={isEditor} onNavigate={(s, inst, tab)=>{ if(inst) handleSelectInstitute(inst).then(()=>{ if(tab) setJumpToTab(tab); }); else setScreen(s); }}/>}
          {screen === 'institutes' && <InstituteList institutes={institutes} onSelect={handleSelectInstitute} onAdd={isAdmin ? ()=>setShowAddInstitute(true) : null} initialSearch={globalSearch}/>}
          {screen === 'detail' && selectedInstitute && (
            <InstituteDetail
              institute={selectedInstitute}
              clients={clients}
              onUpdateClients={handleUpdateClients}
              onBack={()=>{ window.location.hash='institutes'; setScreen('institutes'); setJumpToTab(null); }}
              onUpdate={handleUpdateInstitute}
              onRefresh={handleRefreshInstitute}
              onDelete={handleDeleteInstitute}
              token={token}
              isAdmin={isAdmin}
              isEditor={isEditor}
              jumpToTab={jumpToTab}
              onBulkAdd={()=>{ setBulkAddInstitute(selectedInstitute); window.location.hash=`bulkAdd/${selectedInstitute.id}`; setScreen('bulkAdd'); }}
              onAddNSTB={()=>{ setNstbAddInstitute(selectedInstitute); window.location.hash=`nstbAdd/${selectedInstitute.id}`; setScreen('nstbAdd'); }}
            />
          )}
          {screen === 'bulkAdd' && bulkAddInstitute && (
            <BulkAssignmentForm
              instituteName={bulkAddInstitute.name}
              clients={clients}
              onSave={async (rows) => {
                await Promise.all(rows.map(row => {
                  const payload = {
                    institute_id: bulkAddInstitute.id,
                    client_id: row.manualClient ? null : (row.clientId || null),
                    client_name_manual: row.manualClient ? (row.clientName || null) : null,
                    assignment_name: row.assignmentName,
                    training_type: row.trainingType || '',
                    fiscal_year: row.fy,
                    occupations: (row.occupations||[]).filter(o=>o.nameInLetter||o.ctevtOccupationId).map((o,i)=>({
                      name_in_letter: o.nameInLetter || getOccupation(o.ctevtOccupationId).name || '',
                      ctevt_occupation_id: (() => { const v=o.ctevtOccupationId; return v?(typeof v==='string'&&v.startsWith('c:')?parseInt(v.slice(2)):v):null; })(),
                      trainees: o.trainees ? parseInt(o.trainees) : null,
                      sort_order: i,
                      locations: (row.districts||[]).map(d=>({province:d.province,district:d.district,local_levels:[]})),
                    })),
                    locations: [],
                  };
                  return api('POST', '/assignments', payload, token);
                }));
                await handleRefreshInstitute(bulkAddInstitute.id);
                window.location.hash=`detail/${bulkAddInstitute.id}`; setScreen('detail');
              }}
              onBack={()=>{ window.location.hash=`detail/${bulkAddInstitute.id}`; setScreen('detail'); }}
            />
          )}
          {screen === 'nstbAdd' && nstbAddInstitute && (
            <NSTBBulkPage
              instituteName={nstbAddInstitute.name}
              onSave={async (rows) => {
                await Promise.all(rows.map(row => api('POST', '/nstb', nstbToAPI(row, nstbAddInstitute.id), token)));
                await handleRefreshInstitute(nstbAddInstitute.id);
                window.location.hash=`detail/${nstbAddInstitute.id}`; setScreen('detail');
              }}
              onBack={()=>{ window.location.hash=`detail/${nstbAddInstitute.id}`; setScreen('detail'); }}
            />
          )}
          {screen === 'summary' && <SummaryView institutes={institutes} clients={clients}/>}
          {screen === 'comparison' && <ComparisonView institutes={institutes} clients={clients}/>}
          {screen === 'compliance' && <ProjectCompliance institutes={institutes} clients={clients}/>}
          {screen === 'master' && isAdmin && <MasterData clients={clients} onUpdateClients={handleUpdateClients} token={token} isAdmin={isAdmin} isEditor={isEditor}/>}
          {screen === 'master' && !isAdmin && (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60%',gap:12,color:'var(--text3)'}}>
              <div style={{fontSize:40}}>🔒</div>
              <div style={{fontSize:16,fontWeight:600,color:'var(--text2)'}}>Access restricted</div>
              <div style={{fontSize:13}}>Admin role required to manage master data.</div>
            </div>
          )}
          {screen === 'users' && isAdmin && <UserManagement institutes={institutes} isSuperAdmin={isSuperAdmin}/>}
          {screen === 'users' && !isAdmin && (
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'60%',gap:12,color:'var(--text3)'}}>
              <div style={{fontSize:40}}>🔒</div>
              <div style={{fontSize:16,fontWeight:600,color:'var(--text2)'}}>Access restricted</div>
              <div style={{fontSize:13}}>Admin role required to manage users.</div>
            </div>
          )}
        </div>
      </div>

      {/* Global modals */}
      {showAddInstitute && (
        <InstituteForm onSave={handleAddInstitute} onClose={()=>setShowAddInstitute(false)}/>
      )}
      {showChangePwd && <ChangePasswordModal onClose={()=>setShowChangePwd(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
