// ─── SUMMARY VIEW ─────────────────────────────────────────────────────────────

function SummaryView({institutes, clients}) {
  const [selectedInst, setSelectedInst] = useState('');
  const [selectedFYs, setSelectedFYs] = useState([]);
  const [selectedOccs, setSelectedOccs] = useState([]);
  const [selectedClientTypes, setSelectedClientTypes] = useState([]);
  const [fullInst, setFullInst] = useState(null);
  const [loadingInst, setLoadingInst] = useState(false);

  const institute = fullInst || institutes.find(i=>i.id===parseInt(selectedInst));

  React.useEffect(() => {
    if (!selectedInst) { setFullInst(null); return; }
    setLoadingInst(true);
    api('GET', `/institutes/${selectedInst}`, null, getSession()?.token)
      .then(data => { setFullInst(normInst(data)); setLoadingInst(false); })
      .catch(() => setLoadingInst(false));
  }, [selectedInst]);

  const [occSearch, setOccSearch] = useState('');
  const [minDuration, setMinDuration] = useState('');

  const toggleFY = (fy) => setSelectedFYs(s => s.includes(fy) ? s.filter(f=>f!==fy) : [...s, fy]);
  const toggleOcc = (o) => setSelectedOccs(s => s.includes(o) ? s.filter(x=>x!==o) : [...s, o]);
  const toggleCT = (t) => setSelectedClientTypes(s => s.includes(t) ? s.filter(x=>x!==t) : [...s, t]);

  // Build summary rows
  const summaryRows = useMemo(() => {
    if(!institute) return [];
    const rows = {};

    // Experience
    institute.experience.filter(exp => {
      const fyMatch = selectedFYs.length === 0 || selectedFYs.includes(exp.fy);
      const client = getClient(clients, exp.clientId);
      const ctMatch = selectedClientTypes.length === 0 || selectedClientTypes.includes(client.type);
      return fyMatch && ctMatch;
    }).forEach(exp => {
      const client = getClient(clients, exp.clientId);
      exp.occupations.forEach(occ => {
        if(minDuration && (parseInt(occ.duration)||0) < parseInt(minDuration)) return;
        const ctevtOcc = getOccupation(occ.ctevtOccupationId);
        const occName = ctevtOcc.name || occ.nameInLetter;
        if(selectedOccs.length > 0 && !selectedOccs.includes(occName)) return;

        const key = `${occName}`;
        if(!rows[key]) {
          rows[key] = {
            occupation: occName,
            sector: ctevtOcc.sector || '—',
            level: occ.level || ctevtOcc.level || '—',
            clientIds: new Set(), clientNames: new Set(), clientTypes: new Set(),
            trainees: 0, stAppeared: 0, stPass: 0, hasOptional: false,
            districts: new Set(),
            nstbApplied: 0, nstbAppeared: 0, nstbPass: 0,
            nstbLevel: '—', affiliationStatus: '—', affiliationFrom: '—', affiliationTo: '—'
          };
        }
        const r = rows[key];
        r.clientIds.add(exp.clientId);
        r.clientNames.add(client.shortName || client.fullName);
        r.clientTypes.add(client.type);
        r.trainees += parseInt(occ.trainees)||0;
        if(occ.skillTestAppeared) { r.stAppeared += parseInt(occ.skillTestAppeared)||0; r.hasOptional = true; }
        if(occ.skillTestPass) { r.stPass += parseInt(occ.skillTestPass)||0; }
        (occ.locations||[]).forEach(l => { if(l.district) r.districts.add(l.district); });
      });
    });

    // NSTB
    institute.nstb.filter(n => selectedFYs.length === 0 || selectedFYs.includes(n.fy)).forEach(n => {
      const occName = n.occupation;
      if(!occName) return;
      if(selectedOccs.length > 0 && !selectedOccs.some(o => o.includes(occName) || occName.includes(o.split(',')[0]))) return;
      const matchKey = Object.keys(rows).find(k => k.toLowerCase().includes(occName.toLowerCase()) || occName.toLowerCase().includes(k.split(',')[0].toLowerCase()));
      const key = matchKey || occName;
      if(!rows[key]) {
        rows[key] = {
          occupation: occName, sector: '—',
          clientIds: new Set(), clientNames: new Set(), clientTypes: new Set(),
          trainees: 0, stAppeared: 0, stPass: 0, hasOptional: false,
          districts: new Set(),
          nstbApplied: 0, nstbAppeared: 0, nstbPass: 0,
          nstbLevel: '—', affiliationStatus: '—', affiliationFrom: '—', affiliationTo: '—'
        };
      }
      rows[key].nstbApplied += n.applied||0;
      rows[key].nstbAppeared += n.appeared||0;
      rows[key].nstbPass += n.pass||0;
      rows[key].nstbLevel = n.level;
    });

    // Affiliation
    Object.keys(rows).forEach(key => {
      const aff = institute.affiliation.find(a => (a.programs||[]).some(p => p.name && p.name.toLowerCase().includes(key.split(',')[0].toLowerCase())));
      if(aff) {
        rows[key].affiliationStatus = aff.status;
        rows[key].affiliationFrom = aff.affiliationDate;
        rows[key].affiliationTo = aff.expiryDate;
      }
    });

    return Object.values(rows);
  }, [institute, selectedFYs, selectedOccs, selectedClientTypes, minDuration, clients]);

  // Available occupations from selected institute
  const availableOccs = useMemo(() => {
    if(!institute) return [];
    const occs = new Set();
    institute.experience.forEach(exp => exp.occupations.forEach(occ => {
      const ctevtOcc = getOccupation(occ.ctevtOccupationId);
      occs.add(ctevtOcc.name || occ.nameInLetter);
    }));
    return [...occs];
  }, [institute]);

  return (
    <div className="fade-in" style={{display:'flex', gap:20, alignItems:'flex-start'}}>
      {/* Filter panel */}
      <div className="filter-panel">
        <div className="filter-panel-header">
          <span style={{fontSize:14}}>⚙</span>
          <span className="filter-panel-header-title">Filters</span>
          {(selectedFYs.length > 0 || selectedOccs.length > 0 || selectedClientTypes.length > 0 || minDuration) && (
            <span style={{marginLeft:'auto', background:'var(--accent)', color:'#fff', borderRadius:10, fontSize:10, fontWeight:700, padding:'1px 7px'}}>
              {selectedFYs.length + selectedOccs.length + selectedClientTypes.length + (minDuration?1:0)}
            </span>
          )}
        </div>
        <div className="filter-panel-body">

          <div className="filter-section">
            <div className="filter-label">Institute</div>
            <select value={selectedInst} onChange={e=>setSelectedInst(e.target.value)} style={{width:'100%'}}>
              <option value="">— Select —</option>
              {institutes.map(i=><option key={i.id} value={i.id}>{i.acronym || i.name}</option>)}
            </select>
          </div>

          <div className="filter-section">
            <div className="filter-label">Fiscal year</div>
            <div className="multi-select-list">
              {FISCAL_YEARS.slice().reverse().slice(0,15).map(fy=>(
                <label key={fy} className="multi-select-item">
                  <input type="checkbox" checked={selectedFYs.includes(fy)} onChange={()=>toggleFY(fy)}/>
                  {fy}
                </label>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <div className="filter-label">Occupation</div>
            <input value={occSearch} onChange={e=>setOccSearch(e.target.value)} placeholder="Search…"
              style={{width:'100%', fontSize:12, padding:'5px 8px', marginBottom:6, boxSizing:'border-box'}}/>
            <div className="multi-select-list">
              {availableOccs.filter(o=>!occSearch||o.toLowerCase().includes(occSearch.toLowerCase())).map(o=>(
                <label key={o} className="multi-select-item">
                  <input type="checkbox" checked={selectedOccs.includes(o)} onChange={()=>toggleOcc(o)}/>
                  <span style={{fontSize:11, lineHeight:1.3}}>{o}</span>
                </label>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <div className="filter-label">Client type</div>
            {CLIENT_TYPES.map(t=>(
              <label key={t} className="multi-select-item">
                <input type="checkbox" checked={selectedClientTypes.includes(t)} onChange={()=>toggleCT(t)}/>
                {t}
              </label>
            ))}
          </div>

          <div className="filter-section">
            <div className="filter-label">Min. training duration</div>
            {[['', 'All durations'], ['160', '160+ hrs'], ['390', '390+ hrs']].map(([val, label]) => (
              <label key={val} className="multi-select-item">
                <input type="radio" name="summ-duration" checked={minDuration === val} onChange={()=>setMinDuration(val)}/>
                {label}
              </label>
            ))}
          </div>

        </div>
        <button className="filter-reset-btn" onClick={()=>{setSelectedFYs([]);setSelectedOccs([]);setSelectedClientTypes([]);setMinDuration('');}}>
          ↺ Reset filters
        </button>
      </div>

      {/* Results */}
      <div style={{flex:1, minWidth:0}}>
        {loadingInst ? (
          <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
            <div className="empty-state-icon">⏳</div>
            <div className="empty-state-title">Loading institute data…</div>
          </div>
        ) : !institute ? (
          <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
            <div className="empty-state-icon">📊</div>
            <div className="empty-state-title">Select an institute to view summary</div>
            <div className="empty-state-sub">Choose an institute from the filter panel, then select fiscal years and occupations</div>
          </div>
        ) : (
          <>
            <div style={{display:'flex', alignItems:'center', gap:10, marginBottom:16}}>
              <div>
                <div style={{display:'flex', alignItems:'center', gap:8}}>
                  <div style={{fontWeight:600, fontSize:15}}>{institute.name}</div>
                  {institute.acronym && <span className="badge badge-purple" style={{fontFamily:'var(--font-mono)', fontSize:11}}>{institute.acronym}</span>}
                </div>
                <div style={{fontSize:12, color:'var(--text3)'}}>
                  {selectedFYs.length > 0 ? `FY: ${selectedFYs.join(', ')}` : 'All fiscal years'}
                </div>
              </div>
              <div style={{marginLeft:'auto', display:'flex', gap:8}}>
                <button className="btn btn-secondary btn-sm" onClick={()=>exportSummaryToCSV(institute, summaryRows, selectedFYs)}>↓ Export CSV</button>
              </div>
            </div>

            {/* Turnover summary */}
            {(() => {
              const taxRows = institute.taxClearance.filter(t => selectedFYs.length === 0 || selectedFYs.includes(t.fy));
              if (!taxRows.length) return null;
              const total = taxRows.reduce((s, t) => s + (parseInt(t.turnover) || 0), 0);
              const avg = Math.round(total / taxRows.length);
              return (
                <div style={{display:'flex', gap:12, marginBottom:16, flexWrap:'wrap'}}>
                  {taxRows.map(t => (
                    <div key={t.fy} style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 16px', minWidth:180}}>
                      <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:3}}>Turnover {t.fy}</div>
                      <div style={{fontWeight:700, fontFamily:'var(--font-serif)', fontSize:16}}>NPR {fmt(t.turnover)}</div>
                    </div>
                  ))}
                  {taxRows.length > 1 && (
                    <div style={{background:'var(--accent)', borderRadius:8, padding:'10px 16px', minWidth:180}}>
                      <div style={{fontSize:10, color:'rgba(255,255,255,0.75)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:3}}>Avg annual turnover ({taxRows.length} FYs)</div>
                      <div style={{fontWeight:700, fontFamily:'var(--font-serif)', fontSize:16, color:'#fff'}}>NPR {fmt(avg)}</div>
                    </div>
                  )}
                </div>
              );
            })()}

            {summaryRows.length === 0 ? (
              <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
                <div className="empty-state-title">No data matches current filters</div>
              </div>
            ) : (
              <div className="card" style={{padding:0, overflow:'hidden'}}>
                <div className="table-wrap">
                  <table className="summary-table">
                    <thead>
                      <tr>
                        <th rowSpan="2">Occupation</th>
                        <th rowSpan="2">Level</th>
                        <th rowSpan="2">Sector</th>
                        <th colSpan="5" style={{background:'rgba(45,90,61,0.15)', color:'var(--accent)', textAlign:'center'}}>Experience</th>
                        <th colSpan="5" style={{background:'rgba(26,74,122,0.15)', color:'var(--blue)', textAlign:'center'}}>NSTB (Official)</th>
                        <th colSpan="3" style={{background:'rgba(91,45,142,0.15)', color:'var(--purple)', textAlign:'center'}}>CTEVT Affiliation</th>
                      </tr>
                      <tr>
                        <th>Clients</th><th>Trainees</th><th>Districts</th><th>ST Appeared</th><th>ST Pass</th>
                        <th>Applied</th><th>Appeared</th><th>Pass</th><th>Pass rate</th><th>Appear rate</th>
                        <th>Status</th><th>Valid from</th><th>Valid to</th>
                      </tr>
                    </thead>
                    <tbody>
                      {summaryRows.map((row, i) => (
                        <tr key={i}>
                          <td><strong style={{fontSize:13}}>{row.occupation}</strong></td>
                          <td>{row.level && row.level !== '—' ? <span className="badge badge-purple" style={{fontSize:11}}>{row.level}</span> : <span className="text-muted">—</span>}</td>
                          <td><span className="text-sm text-muted">{row.sector}</span></td>
                          <td>
                            <div style={{fontWeight:600}}>{row.clientIds.size}</div>
                            <div style={{fontSize:11, color:'var(--text3)'}}>{[...row.clientNames].join(', ')}</div>
                          </td>
                          <td className="mono">{row.trainees}</td>
                          <td>
                            {[...row.districts].length > 0 ? (
                              <div>
                                <div style={{fontWeight:600}}>{row.districts.size} districts</div>
                                <div style={{fontSize:11, color:'var(--text3)'}}>{[...row.districts].join(', ')}</div>
                              </div>
                            ) : '—'}
                          </td>
                          <td className="mono">{row.stAppeared || '—'}</td>
                          <td className="mono">{row.stPass || '—'}</td>
                          <td className="mono">{row.nstbApplied || '—'}</td>
                          <td className="mono">{row.nstbAppeared || '—'}</td>
                          <td className="mono">{row.nstbPass || '—'}</td>
                          <td>{row.nstbPass && row.nstbAppeared ? <span className={`badge ${parseFloat(pct(row.nstbPass,row.nstbAppeared))>=70?'badge-active':'badge-pending'}`}>{pct(row.nstbPass, row.nstbAppeared)}</span> : '—'}</td>
                          <td>{row.nstbApplied && row.nstbAppeared ? <span className="badge badge-info">{pct(row.nstbAppeared, row.nstbApplied)}</span> : '—'}</td>
                          <td>{row.affiliationStatus !== '—' ? <span className={`badge ${row.affiliationStatus==='Active'?'badge-active':row.affiliationStatus==='Expired'?'badge-expired':'badge-pending'}`}>{row.affiliationStatus}</span> : '—'}</td>
                          <td className="text-sm">{row.affiliationFrom}</td>
                          <td className="text-sm">{row.affiliationTo}</td>
                        </tr>
                      ))}
                      {(() => {
                        const tot = summaryRows.reduce((acc, r) => ({
                          trainees: acc.trainees + r.trainees,
                          stAppeared: acc.stAppeared + r.stAppeared,
                          stPass: acc.stPass + r.stPass,
                          nstbApplied: acc.nstbApplied + r.nstbApplied,
                          nstbAppeared: acc.nstbAppeared + r.nstbAppeared,
                          nstbPass: acc.nstbPass + r.nstbPass,
                          allDistricts: new Set([...acc.allDistricts, ...r.districts]),
                        }), {trainees:0,stAppeared:0,stPass:0,nstbApplied:0,nstbAppeared:0,nstbPass:0,allDistricts:new Set()});
                        return (
                          <tr style={{background:'color-mix(in srgb, var(--accent) 8%, transparent)', fontWeight:600}}>
                            <td style={{fontSize:12, color:'var(--text2)'}}>TOTAL</td>
                            <td/>
                            <td/>
                            <td className="mono">{tot.trainees || '—'}</td>
                            <td><span style={{fontWeight:700}}>{tot.allDistricts.size || '—'}</span></td>
                            <td className="mono">{tot.stAppeared || '—'}</td>
                            <td className="mono">{tot.stPass || '—'}</td>
                            <td className="mono">{tot.nstbApplied || '—'}</td>
                            <td className="mono">{tot.nstbAppeared || '—'}</td>
                            <td className="mono">{tot.nstbPass || '—'}</td>
                            <td>{tot.nstbPass && tot.nstbAppeared ? <span className={`badge ${parseFloat(pct(tot.nstbPass,tot.nstbAppeared))>=70?'badge-active':'badge-pending'}`}>{pct(tot.nstbPass,tot.nstbAppeared)}</span> : '—'}</td>
                            <td>{tot.nstbApplied && tot.nstbAppeared ? <span className="badge badge-info">{pct(tot.nstbAppeared,tot.nstbApplied)}</span> : '—'}</td>
                            <td/><td/><td/>
                          </tr>
                        );
                      })()}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

// Compute compliance-style stats for a single institute
function computeInstStats(inst, {selectedFYs, selectedClientTypes, selectedOccs, minDuration, clients}) {
  const occMatch = (occ, soLow) => {
    const cn = (getOccupation(occ.ctevtOccupationId).name || '').toLowerCase();
    const en = (occ.nameInLetter || '').toLowerCase();
    return (cn && (cn === soLow || cn.includes(soLow))) || (en && en.includes(soLow));
  };
  const relevantExps = inst.experience.filter(exp => {
    if (selectedFYs.length > 0 && !selectedFYs.includes(exp.fy)) return false;
    if (selectedClientTypes && selectedClientTypes.length > 0) {
      const client = getClient(clients, exp.clientId);
      if (!selectedClientTypes.includes(client.type)) return false;
    }
    if (selectedOccs.length > 0 && !exp.occupations.some(occ => selectedOccs.some(so => occMatch(occ, so.toLowerCase())))) return false;
    return true;
  });
  const taxRows = inst.taxClearance.filter(t => !selectedFYs.length || selectedFYs.includes(t.fy));
  const avgTurnover = taxRows.length ? Math.round(taxRows.reduce((s,t) => s+(parseInt(t.turnover)||0), 0) / taxRows.length) : 0;
  const occBreakdown = selectedOccs.length > 0
    ? selectedOccs.map(so => {
        const soLow = so.toLowerCase();
        let trainees=0, assignments=0; const districts=new Set();
        relevantExps.forEach(exp => {
          let hit=false;
          exp.occupations.forEach(occ => {
            if (!occMatch(occ, soLow)) return;
            if (minDuration && (parseInt(occ.duration)||0) < parseInt(minDuration)) return;
            hit=true; trainees+=parseInt(occ.trainees)||0;
            (occ.locations||[]).forEach(l => { if (l.district) districts.add(l.district); });
          });
          if (hit) assignments++;
        });
        const affRec = inst.affiliation.find(a => (a.programs||[]).some(p => p.name && p.name.toLowerCase().includes(soLow.split(',')[0])));
        return {name:so, trainees, assignments, districts:[...districts].sort(), affStatus: affRec?.status||null};
      })
    : [(() => {
        let trainees=0; const districts=new Set();
        relevantExps.forEach(exp => exp.occupations.forEach(occ => {
          if (minDuration && (parseInt(occ.duration)||0) < parseInt(minDuration)) return;
          trainees+=parseInt(occ.trainees)||0;
          (occ.locations||[]).forEach(l => { if (l.district) districts.add(l.district); });
        }));
        return {name:null, trainees, assignments:relevantExps.length, districts:[...districts].sort(), affStatus:null};
      })()];
  return {
    inst, avgTurnover, occBreakdown,
    totalTrainees: occBreakdown.reduce((s,o) => s+o.trainees, 0),
    assignments: relevantExps.length,
    allDistricts: [...new Set(occBreakdown.flatMap(o => o.districts))].sort(),
  };
}

// Aggregate stats for a JV group
function computeJVStats(group, partnerInsts, filters) {
  const ps = partnerInsts.map(inst => computeInstStats(inst, filters));
  const combinedTurnover = ps.reduce((s,p) => s+p.avgTurnover, 0);
  const occBreakdown = filters.selectedOccs.length > 0
    ? filters.selectedOccs.map((so,si) => ({
        name: so,
        trainees: ps.reduce((s,p) => s+(p.occBreakdown[si]?.trainees||0), 0),
        assignments: ps.reduce((s,p) => s+(p.occBreakdown[si]?.assignments||0), 0),
        districts: [...new Set(ps.flatMap(p => p.occBreakdown[si]?.districts||[]))].sort(),
        affStatus: ps.some(p => p.occBreakdown[si]?.affStatus==='Active') ? 'Active' : null,
      }))
    : [{
        name: null,
        trainees: ps.reduce((s,p) => s+(p.occBreakdown[0]?.trainees||0), 0),
        assignments: ps.reduce((s,p) => s+p.assignments, 0),
        districts: [...new Set(ps.flatMap(p => p.occBreakdown[0]?.districts||[]))].sort(),
        affStatus: null,
      }];
  return {
    isJV: true, group, partnerStats: ps, combinedTurnover, occBreakdown,
    totalTrainees: occBreakdown.reduce((s,o) => s+o.trainees, 0),
    assignments: ps.reduce((s,p) => s+p.assignments, 0),
    allDistricts: [...new Set(occBreakdown.flatMap(o => o.districts))].sort(),
  };
}

// Inline JV group builder — used in both compliance and comparison filter panels
function JVGroupPanel({institutes, jvGroups, onChange}) {
  const [adding, setAdding] = useState(false);
  const [editId, setEditId] = useState(null);
  const [draft, setDraft] = useState({name:'', partnerIds:[]});
  const [search, setSearch] = useState('');

  const openAdd = () => { setDraft({name:'', partnerIds:[]}); setSearch(''); setEditId(null); setAdding(true); };
  const openEdit = (g) => { setDraft({name:g.name, partnerIds:[...g.partnerIds]}); setSearch(''); setEditId(g.id); setAdding(true); };
  const cancel = () => { setAdding(false); setEditId(null); setDraft({name:'', partnerIds:[]}); setSearch(''); };

  const togglePartner = (id) => setDraft(d => ({...d, partnerIds:
    d.partnerIds.includes(id) ? d.partnerIds.filter(x=>x!==id)
    : d.partnerIds.length < 6 ? [...d.partnerIds, id] : d.partnerIds
  }));

  const save = () => {
    if (draft.partnerIds.length < 2) return;
    const name = draft.name.trim() || `JV ${jvGroups.length + (editId ? 0 : 1)}`;
    if (editId) {
      onChange(jvGroups.map(g => g.id===editId ? {...g, name, partnerIds:draft.partnerIds} : g));
    } else {
      onChange([...jvGroups, {id:`jv-${Date.now()}`, name, partnerIds:draft.partnerIds}]);
    }
    cancel();
  };

  const removeGroup = (id) => onChange(jvGroups.filter(g => g.id!==id));

  const filtered = search ? institutes.filter(i =>
    i.name.toLowerCase().includes(search.toLowerCase()) || (i.acronym||'').toLowerCase().includes(search.toLowerCase())
  ) : institutes;

  return (
    <div className="filter-section">
      <div className="filter-label" style={{display:'flex', alignItems:'center', justifyContent:'space-between'}}>
        <span>JV Groups</span>
        {!adding && (
          <button onClick={openAdd} style={{fontSize:10, color:'var(--accent)', background:'none', border:'none', cursor:'pointer', padding:0, fontWeight:600}}>
            + Add JV
          </button>
        )}
      </div>

      {jvGroups.length === 0 && !adding && (
        <div style={{fontSize:11, color:'var(--text3)', padding:'4px 0', lineHeight:1.5}}>
          Group 2–6 firms into a JV to see their combined competence
        </div>
      )}

      {jvGroups.map(g => (
        <div key={g.id} style={{display:'flex', alignItems:'flex-start', gap:6, padding:'6px 0', borderBottom:'1px solid var(--border)'}}>
          <span style={{fontSize:12, marginTop:1, flexShrink:0}}>🤝</span>
          <div style={{flex:1, minWidth:0}}>
            <div style={{fontSize:12, fontWeight:600, color:'var(--text)'}}>{g.name}</div>
            <div style={{fontSize:10, color:'var(--text3)', lineHeight:1.5, marginTop:1}}>
              {g.partnerIds.map(id => {
                const inst = institutes.find(i => i.id===id);
                return inst ? (inst.acronym || inst.name.split(' ').slice(0,3).join(' ')) : '?';
              }).join(' · ')}
            </div>
          </div>
          <div style={{display:'flex', gap:4, flexShrink:0}}>
            <button onClick={()=>openEdit(g)} style={{fontSize:10, color:'var(--accent)', background:'none', border:'none', cursor:'pointer', padding:0}}>✏</button>
            <button onClick={()=>removeGroup(g.id)} style={{fontSize:12, color:'var(--text3)', background:'none', border:'none', cursor:'pointer', padding:0}}>✕</button>
          </div>
        </div>
      ))}

      {adding && (
        <div style={{marginTop:8, padding:'10px', background:'var(--bg2)', borderRadius:'var(--radius)', border:'1px solid var(--border)'}}>
          <div style={{fontSize:11, fontWeight:600, color:'var(--text2)', marginBottom:6}}>
            {editId ? 'Edit JV group' : 'New JV group'}
          </div>
          <input className="form-input" style={{fontSize:12, padding:'5px 8px', marginBottom:8, width:'100%', boxSizing:'border-box'}}
            placeholder="JV name (optional)" value={draft.name} onChange={e=>setDraft(d=>({...d,name:e.target.value}))}/>
          <div style={{fontSize:11, color:'var(--text3)', marginBottom:4}}>Select 2–6 partner firms:</div>
          <input className="form-input" style={{fontSize:11, padding:'4px 7px', marginBottom:6, width:'100%', boxSizing:'border-box'}}
            placeholder="Search firms…" value={search} onChange={e=>setSearch(e.target.value)}/>
          <div style={{maxHeight:150, overflowY:'auto', marginBottom:6}}>
            {filtered.map(inst => {
              const checked = draft.partnerIds.includes(inst.id);
              const disabled = !checked && draft.partnerIds.length >= 6;
              return (
                <label key={inst.id} style={{display:'flex', alignItems:'center', gap:6, padding:'3px 0', opacity:disabled?0.4:1, cursor:disabled?'not-allowed':'pointer'}}>
                  <input type="checkbox" checked={checked} disabled={disabled} onChange={()=>togglePartner(inst.id)}/>
                  <span style={{fontSize:11, lineHeight:1.3}}>
                    {inst.acronym && <span style={{color:'var(--accent)', fontFamily:'var(--font-mono)', marginRight:4}}>{inst.acronym}</span>}
                    {inst.name.split(' ').slice(0,4).join(' ')}
                  </span>
                </label>
              );
            })}
          </div>
          <div style={{fontSize:10, color: draft.partnerIds.length>=2 ? 'var(--accent)' : 'var(--text3)', marginBottom:8}}>
            {draft.partnerIds.length} firm{draft.partnerIds.length!==1?'s':''} selected {draft.partnerIds.length>=2&&'✓'}
          </div>
          <div style={{display:'flex', gap:6}}>
            <button className="btn btn-primary btn-sm" style={{fontSize:11}} onClick={save} disabled={draft.partnerIds.length<2}>
              {editId ? 'Save changes' : 'Create JV'}
            </button>
            <button className="btn btn-secondary btn-sm" style={{fontSize:11}} onClick={cancel}>Cancel</button>
          </div>
        </div>
      )}
    </div>
  );
}

function ProjectCompliance({institutes, clients}) {
  const token = getSession()?.token;
  const [fullInsts, setFullInsts] = useState({});
  const [loading, setLoading] = useState(false);
  const [selectedFYs, setSelectedFYs] = useState([]);
  const [selectedClientTypes, setSelectedClientTypes] = useState([]);
  const [selectedOccs, setSelectedOccs] = useState([]);
  const [minDuration, setMinDuration] = useState('');
  const [occSearch, setOccSearch] = useState('');
  const [jvGroups, setJvGroups] = useState([]);

  // Load all institute details once
  useEffect(() => {
    if (!institutes.length) return;
    setLoading(true);
    Promise.all(
      institutes.map(inst =>
        api('GET', `/institutes/${inst.id}`, null, token)
          .then(data => [inst.id, normInst(data)])
          .catch(() => [inst.id, null])
      )
    ).then(results => {
      const map = {};
      results.forEach(([id, data]) => { if (data) map[id] = data; });
      setFullInsts(map);
      setLoading(false);
    });
  }, [institutes.length]);

  const toggleFY = fy => setSelectedFYs(s => s.includes(fy) ? s.filter(x=>x!==fy) : [...s, fy]);
  const toggleCT = ct => setSelectedClientTypes(s => s.includes(ct) ? s.filter(x=>x!==ct) : [...s, ct]);
  const toggleOcc = o => setSelectedOccs(s => s.includes(o) ? s.filter(x=>x!==o) : [...s, o]);

  const filteredOccList = useMemo(() => {
    if (!occSearch.trim()) return OCCUPATIONS;
    const q = occSearch.toLowerCase();
    return OCCUPATIONS.filter(o => o.name.toLowerCase().includes(q) || o.sector.toLowerCase().includes(q));
  }, [occSearch]);

  const filters = {selectedFYs, selectedClientTypes, selectedOccs, minDuration, clients};
  const activeFilterCount = selectedFYs.length + selectedClientTypes.length + selectedOccs.length + (minDuration?1:0);

  // Individual firm results
  const results = useMemo(() => {
    if (!activeFilterCount) return null;
    return Object.values(fullInsts).map(inst => {
      const r = computeInstStats(inst, filters);
      if (!r.assignments && selectedOccs.length > 0) return null;
      return r;
    }).filter(Boolean);
  }, [fullInsts, selectedFYs, selectedClientTypes, selectedOccs, minDuration, clients, activeFilterCount]);

  // JV group results
  const jvResults = useMemo(() => {
    if (!activeFilterCount) return [];
    return jvGroups.map(g => {
      const partnerInsts = g.partnerIds.map(id => fullInsts[id]).filter(Boolean);
      if (!partnerInsts.length) return null;
      return computeJVStats(g, partnerInsts, filters);
    }).filter(Boolean);
  }, [jvGroups, fullInsts, selectedFYs, selectedClientTypes, selectedOccs, minDuration, clients, activeFilterCount]);

  const resetFilters = () => { setSelectedFYs([]); setSelectedClientTypes([]); setSelectedOccs([]); setMinDuration(''); setOccSearch(''); };

  const renderOccCells = (r) => selectedOccs.length > 0
    ? r.occBreakdown.map(o => {
        const affColor = o.affStatus==='Active' ? 'var(--green,#22c55e)' : o.affStatus ? 'var(--text3)' : null;
        return (
          <React.Fragment key={o.name}>
            <td className="mono" style={{textAlign:'center', borderLeft:'1px solid var(--border)'}}>
              {o.trainees>0 ? <span style={{fontWeight:600}}>{o.trainees.toLocaleString()}</span> : <span style={{color:'var(--text3)'}}>—</span>}
              {o.assignments>0 && <div style={{fontSize:10, color:'var(--text3)'}}>{o.assignments} asgn</div>}
            </td>
            <td style={{textAlign:'center', fontSize:11}}>
              {o.affStatus ? <span style={{color:affColor, fontWeight:600}}>{o.affStatus}</span> : <span style={{color:'var(--text3)'}}>—</span>}
            </td>
          </React.Fragment>
        );
      })
    : <>
        <td className="mono" style={{textAlign:'center'}}>{r.assignments||'—'}</td>
        <td className="mono" style={{textAlign:'center'}}>{r.totalTrainees>0 ? r.totalTrainees.toLocaleString() : '—'}</td>
      </>;

  const hasAny = results !== null && (results.length > 0 || jvResults.length > 0);

  return (
    <div className="fade-in" style={{display:'flex', gap:20, alignItems:'flex-start'}}>
      {/* Filter panel */}
      <div className="filter-panel">
        <div className="filter-panel-header">
          <span style={{fontSize:14}}>✅</span>
          <span className="filter-panel-header-title">Project criteria</span>
          {activeFilterCount > 0 && (
            <span style={{marginLeft:'auto', background:'var(--accent)', color:'#fff', borderRadius:10, fontSize:10, fontWeight:700, padding:'1px 7px'}}>{activeFilterCount}</span>
          )}
        </div>
        <div className="filter-panel-body">
          <div className="filter-section">
            <div className="filter-label">Fiscal year</div>
            <div className="multi-select-list">
              {FISCAL_YEARS.slice().reverse().slice(0,10).map(fy => (
                <label key={fy} className="multi-select-item">
                  <input type="checkbox" checked={selectedFYs.includes(fy)} onChange={()=>toggleFY(fy)}/>
                  {fy}
                </label>
              ))}
            </div>
          </div>
          <div className="filter-section">
            <div className="filter-label">Client type</div>
            {['Government','NGO','INGO','Association','Private Limited','Public Limited','Other'].map(ct => (
              <label key={ct} className="multi-select-item">
                <input type="checkbox" checked={selectedClientTypes.includes(ct)} onChange={()=>toggleCT(ct)}/>
                {ct}
              </label>
            ))}
          </div>
          <div className="filter-section">
            <div className="filter-label">Occupation</div>
            {selectedOccs.length > 0 && (
              <div style={{marginBottom:6, display:'flex', flexWrap:'wrap', gap:4}}>
                {selectedOccs.map(o => (
                  <span key={o} style={{fontSize:10, background:'color-mix(in srgb, var(--accent) 15%, transparent)', color:'var(--accent)', borderRadius:4, padding:'2px 6px', cursor:'pointer'}} onClick={()=>toggleOcc(o)}>
                    {o.split(',')[0]} ✕

            <input className="form-input" style={{marginBottom:6, fontSize:12, padding:'5px 8px'}}

            <div className="multi-select-list" style={{maxHeight:180, overflowY:'auto'}}>

                  {jvResults.length > 0 && results.length > 0 && (
                    <tr>
                      <td colSpan={99} style={{padding:'4px 16px', background:'var(--bg2)', fontSize:10, color:'var(--text3)', fontWeight:600, letterSpacing:'0.5px', textTransform:'uppercase'}}>
                        Individual firms
                      </td>
                    </tr>
                  )}

                  {/* Individual firm rows */}
                  {results.map(r => (
                    <tr key={r.inst.id}>
                      <td>
                        <div style={{fontWeight:600, fontSize:13}}>{r.inst.name}</div>
                        {r.inst.acronym && <span className="badge badge-purple" style={{fontSize:10, fontFamily:'var(--font-mono)'}}>{r.inst.acronym}</span>}
                      </td>
                      <td className="mono" style={{fontSize:12}}>
                        {r.avgTurnover > 0
                          ? <span>NPR {fmt(r.avgTurnover)}{selectedFYs.length > 0 && <span style={{fontSize:10, color:'var(--text3)', display:'block'}}>{selectedFYs.length} FY avg</span>}</span>
                          : <span style={{color:'var(--text3)'}}>—</span>}
                      </td>
                      {renderOccCells(r)}
                      <td style={{fontSize:11, color:'var(--text3)', maxWidth:200}}>
                        {r.allDistricts.length > 0
                          ? <><span style={{fontWeight:600, color:'var(--accent)'}}>{r.allDistricts.length}</span> — {r.allDistricts.join(', ')}</>
                          : '—'}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── COMPARISON VIEW ─────────────────────────────────────────────────────────

function ComparisonView({institutes, clients}) {
  const [selectedInsts, setSelectedInsts] = useState([]);
  const [jvGroups, setJvGroups] = useState([]);
  const [selectedFYs, setSelectedFYs] = useState([]);
  const [selectedOccs, setSelectedOccs] = useState([]);
  const [fullInsts, setFullInsts] = useState({});
  const [occSearch, setOccSearch] = useState('');
  const [minDuration, setMinDuration] = useState('');

  const toggleInst = (id) => setSelectedInsts(s => s.includes(id) ? s.filter(x=>x!==id) : [...s, id]);
  const toggleFY = (fy) => setSelectedFYs(s => s.includes(fy) ? s.filter(f=>f!==fy) : [...s, fy]);
  const toggleOcc = (o) => setSelectedOccs(s => s.includes(o) ? s.filter(x=>x!==o) : [...s, o]);

  // Load full data for all needed institute IDs (selected + JV partners)
  React.useEffect(() => {
    const needed = [...new Set([...selectedInsts, ...jvGroups.flatMap(g => g.partnerIds)])];
    needed.forEach(id => {
      if (fullInsts[id]) return;
      api('GET', `/institutes/${id}`, null, getSession()?.token)
        .then(data => setFullInsts(prev => ({...prev, [id]: normInst(data)})))
        .catch(() => {});
    });
  }, [selectedInsts, jvGroups]);

  const selectedInstObjects = selectedInsts.map(id => fullInsts[id] || institutes.find(i=>i.id===id)).filter(Boolean);

  // Collect all unique occupations across selected institutes + JV partners
  const allInstIds = [...new Set([...selectedInsts, ...jvGroups.flatMap(g => g.partnerIds)])];
  const allOccs = useMemo(() => {
    const occs = new Set();
    allInstIds.forEach(id => {
      const inst = fullInsts[id] || institutes.find(i => i.id===id);
      if (!inst) return;
      (inst.nstb||[]).forEach(n => occs.add(n.occupation));
      (inst.experience||[]).forEach(exp => exp.occupations.forEach(o => {
        const ctevt = getOccupation(o.ctevtOccupationId);
        occs.add(ctevt.name || o.nameInLetter);
      }));
    });
    return [...occs].filter(Boolean).sort();
  }, [selectedInstObjects, jvGroups, fullInsts]);

  const activeFilterCount = selectedInsts.length + selectedFYs.length + selectedOccs.length + (minDuration?1:0) + jvGroups.length;

  // Aggregate NSTB rows for a list of institute objects
  const aggregateNSTB = (instList, selFYs, selOccs) => {
    const all = instList.flatMap(inst => (inst.nstb||[]).filter(n => {
      const fyMatch = selFYs.length === 0 || selFYs.includes(n.fy);
      const occMatch = selOccs.length === 0 || selOccs.some(o =>
        o.toLowerCase().includes(n.occupation.toLowerCase()) || n.occupation.toLowerCase().includes(o.split(',')[0].toLowerCase())
      );
      return fyMatch && occMatch;
    }));
    // Group by occupation+level, sum the numbers
    const groups = {};
    all.forEach(n => {
      const key = `${n.occupation}||${n.level}||${n.fy}`;
      if (!groups[key]) groups[key] = {...n, applied:0, appeared:0, pass:0, _insts:new Set()};
      groups[key].applied += (n.applied||0);
      groups[key].appeared += (n.appeared||0);
      groups[key].pass += (n.pass||0);
      groups[key]._insts.add(n.id);
    });
    return Object.values(groups);
  };

  const aggregateExpStats = (instList, selFYs, selOccs, minDur) => {
    let totalTrainees=0, totalStAppeared=0, totalStPass=0;
    instList.forEach(inst => {
      const expRows = (inst.experience||[]).filter(e => selFYs.length===0 || selFYs.includes(e.fy));
      expRows.flatMap(e => e.occupations).filter(o => {
        if (minDur && (parseInt(o.duration)||0) < parseInt(minDur)) return false;
        const ctevt = getOccupation(o.ctevtOccupationId);
        const occName = ctevt.name || o.nameInLetter;
        return selOccs.length===0 || selOccs.includes(occName);
      }).forEach(o => {
        totalTrainees += parseInt(o.trainees)||0;
        totalStAppeared += parseInt(o.skillTestAppeared)||0;
        totalStPass += parseInt(o.skillTestPass)||0;
      });
    });
    return {totalTrainees, totalStAppeared, totalStPass};
  };

  const avgTurnoverForInsts = (instList, selFYs) => {
    const allTax = instList.flatMap(inst => (inst.taxClearance||[]).filter(t => selFYs.length===0 || selFYs.includes(t.fy)));
    if (!allTax.length) return 0;
    return Math.round(allTax.reduce((s,t) => s+(parseInt(t.turnover)||0), 0) / allTax.length);
  };

  const renderComparisonCard = (label, instList, isJV=false, jvGroup=null) => {
    if (!instList.length) return null;
    const nstbRows = aggregateNSTB(instList, selectedFYs, selectedOccs);
    const {totalTrainees, totalStAppeared, totalStPass} = aggregateExpStats(instList, selectedFYs, selectedOccs, minDuration);
    const totalApplied = nstbRows.reduce((s,n) => s+(n.applied||0), 0);
    const totalPass = nstbRows.reduce((s,n) => s+(n.pass||0), 0);
    const totalAppeared = nstbRows.reduce((s,n) => s+(n.appeared||0), 0);
    const avgTurnover = isJV
      ? instList.reduce((s,inst) => {
          const rows = (inst.taxClearance||[]).filter(t => selectedFYs.length===0||selectedFYs.includes(t.fy));
          return s + (rows.length ? Math.round(rows.reduce((a,t)=>a+(parseInt(t.turnover)||0),0)/rows.length) : 0);
        }, 0)
      : avgTurnoverForInsts(instList, selectedFYs);

    const headerBg = isJV ? 'color-mix(in srgb, var(--accent) 85%, #000)' : 'var(--text)';
    const inst = !isJV ? instList[0] : null;

    return (
      <div className="card" style={{marginBottom:16, padding:0, overflow:'hidden'}}>
        {/* Header */}
        <div style={{padding:'14px 20px', background:headerBg, display:'flex', alignItems:'center', gap:10}}>
          {isJV && <span style={{fontSize:16}}>🤝</span>}
          {inst?.acronym && (
            <span style={{background:'rgba(109,191,138,0.2)', color:'#6DBF8A', fontFamily:'var(--font-mono)', fontSize:12, fontWeight:600, padding:'2px 8px', borderRadius:4}}>
              {inst.acronym}
            </span>
          )}
          <span style={{fontWeight:700, color:'#fff', fontSize:14}}>{label}</span>
          {!isJV && inst && <StatusBadge status={inst.status}/>}
          {isJV && (
            <span style={{fontSize:11, color:'rgba(255,255,255,0.6)', marginLeft:4}}>
              {instList.map(i => i.acronym || i.name.split(' ')[0]).join(' · ')}
            </span>
          )}
          {!isJV && inst && <span style={{color:'rgba(255,255,255,0.4)', fontSize:12, marginLeft:'auto'}}>{inst.address}</span>}
        </div>

        {/* Stats bar */}
        <div style={{display:'flex', gap:0, borderBottom:'1px solid var(--border)'}}>
          {[
            ['Total trainees', totalTrainees, 'var(--accent)'],
            ...(totalStAppeared>0 ? [['ST appeared', totalStAppeared, 'var(--accent)']] : []),
            ...(totalStPass>0 ? [['ST pass', totalStPass, 'var(--accent)']] : []),
            ['NSTB applied', totalApplied, 'var(--blue)'],
            ['NSTB appeared', totalAppeared, 'var(--text2)'],
            ['NSTB pass', totalPass, 'var(--accent)'],
            ['Pass rate', totalAppeared>0?(totalPass/totalAppeared*100).toFixed(1)+'%':'—', 'var(--amber)'],
            ['Appear rate', totalApplied>0?(totalAppeared/totalApplied*100).toFixed(1)+'%':'—', 'var(--blue)'],
            ...(avgTurnover>0 ? [[isJV?'Combined turnover':'Avg turnover/yr', `NPR ${fmt(avgTurnover)}`, 'var(--amber)']] : []),
          ].map(([lbl,val,color],i) => (
            <div key={i} style={{flex:1, padding:'12px 14px', borderRight:'1px solid var(--border)', textAlign:'center'}}>
              <div style={{fontSize:10, color:'var(--text3)', textTransform:'uppercase', letterSpacing:'0.5px', marginBottom:4}}>{lbl}</div>
              <div style={{fontSize:18, fontWeight:700, fontFamily:'var(--font-serif)', color}}>{val||'—'}</div>
            </div>
          ))}
        </div>

        {/* NSTB detail table */}
        <div className="table-wrap">
          <table>
            <thead><tr>
              <th>Occupation</th><th>Level</th><th>FY</th>
              <th>Applied</th><th>Appeared</th><th>Pass</th>
              <th>Appear rate</th><th>Pass rate</th><th>Affiliation</th>
            </tr></thead>
            <tbody>
              {nstbRows.length === 0
                ? <tr><td colSpan="9" style={{textAlign:'center', color:'var(--text3)', padding:'20px'}}>No NSTB data for selected filters</td></tr>
                : nstbRows.map((r,ri) => {
                    const hasAffil = instList.some(inst =>
                      (inst.affiliation||[]).some(a => a.status==='Active' &&
                        (a.programs||[]).some(p => p.name && p.name.toLowerCase().includes(r.occupation.toLowerCase())))
                    );
                    return (
                      <tr key={ri}>
                        <td><strong>{r.occupation}</strong></td>
                        <td><span className="badge badge-purple">{r.level}</span></td>
                        <td className="mono text-sm">{r.fy}</td>
                        <td className="mono">{r.applied}</td>
                        <td className="mono">{r.appeared}</td>
                        <td className="mono">{r.pass}</td>
                        <td><span className="badge badge-info">{pct(r.appeared, r.applied)}</span></td>
                        <td><span className={`badge ${parseFloat(pct(r.pass,r.appeared))>=70?'badge-active':'badge-pending'}`}>{pct(r.pass,r.appeared)}</span></td>
                        <td>{hasAffil ? <span className="badge badge-active">Active</span> : <span className="badge badge-gray">—</span>}</td>
                      </tr>
                    );
                  })
              }
            </tbody>
          </table>
        </div>
      </div>
    );
  };

  const hasAnything = selectedInstObjects.length > 0 || jvGroups.some(g => g.partnerIds.some(id => fullInsts[id]));

  return (
    <div className="fade-in" style={{display:'flex', gap:20, alignItems:'flex-start'}}>
      <div className="filter-panel">
        <div className="filter-panel-header">
          <span style={{fontSize:14}}>⚖</span>
          <span className="filter-panel-header-title">Compare</span>
          {activeFilterCount > 0 && (
            <span style={{marginLeft:'auto', background:'var(--accent)', color:'#fff', borderRadius:10, fontSize:10, fontWeight:700, padding:'1px 7px'}}>
              {activeFilterCount}
            </span>
          )}
        </div>
        <div className="filter-panel-body">

          <div className="filter-section">
            <div className="filter-label">Individual firms</div>
            {institutes.map(i=>(
              <label key={i.id} className="multi-select-item">
                <input type="checkbox" checked={selectedInsts.includes(i.id)} onChange={()=>toggleInst(i.id)}/>
                <span style={{fontSize:12, lineHeight:1.3}}>
                  {i.acronym ? <span className="mono" style={{color:'var(--accent)'}}>{i.acronym}</span> : i.name.split(' ').slice(0,4).join(' ')}
                </span>
              </label>
            ))}
          </div>

          <JVGroupPanel institutes={institutes} jvGroups={jvGroups} onChange={setJvGroups}/>

          <div className="filter-section">
            <div className="filter-label">Fiscal year</div>
            <div className="multi-select-list">
              {FISCAL_YEARS.slice().reverse().slice(0,10).map(fy=>(
                <label key={fy} className="multi-select-item">
                  <input type="checkbox" checked={selectedFYs.includes(fy)} onChange={()=>toggleFY(fy)}/>
                  {fy}
                </label>
              ))}
            </div>
          </div>

          <div className="filter-section">
            <div className="filter-label">Occupation</div>
            {allOccs.length === 0
              ? <div style={{fontSize:11, color:'var(--text3)', padding:'4px 0'}}>Select institutes first</div>
              : <>
                  <input value={occSearch} onChange={e=>setOccSearch(e.target.value)} placeholder="Search…"
                    style={{width:'100%', fontSize:12, padding:'5px 8px', marginBottom:6, boxSizing:'border-box'}}/>
                  <div className="multi-select-list">
                    {allOccs.filter(o=>!occSearch||o.toLowerCase().includes(occSearch.toLowerCase())).map(o=>(
                      <label key={o} className="multi-select-item">
                        <input type="checkbox" checked={selectedOccs.includes(o)} onChange={()=>toggleOcc(o)}/>
                        <span style={{fontSize:11, lineHeight:1.3}}>{o}</span>
                      </label>
                    ))}
                  </div>
                </>
            }
          </div>

          <div className="filter-section">
            <div className="filter-label">Min. training duration</div>
            {[['','All durations'],['160','160+ hrs'],['390','390+ hrs']].map(([val,label]) => (
              <label key={val} className="multi-select-item">
                <input type="radio" name="comp-duration" checked={minDuration===val} onChange={()=>setMinDuration(val)}/>
                {label}
              </label>
            ))}
          </div>

        </div>
        <button className="filter-reset-btn" onClick={()=>{setSelectedInsts([]);setJvGroups([]);setSelectedFYs([]);setSelectedOccs([]);setMinDuration('');}}>
          ↺ Reset
        </button>
      </div>

      <div style={{flex:1, minWidth:0}}>
        {!hasAnything ? (
          <div className="empty-state" style={{background:'var(--surface)', border:'1px solid var(--border)', borderRadius:'var(--radius-lg)'}}>
            <div className="empty-state-icon">⚖</div>
            <div className="empty-state-title">Select firms or create a JV to compare</div>
            <div className="empty-state-sub">Pick individual firms from the list, or group 2–6 firms into a JV using the "JV Groups" panel</div>
          </div>
        ) : (
          <>
            <div style={{display:'flex', justifyContent:'flex-end', gap:8, marginBottom:12}}>
              <button className="btn btn-secondary btn-sm" onClick={()=>exportComparisonToCSV(selectedInstObjects, selectedFYs)}>↓ Export (CSV)</button>
            </div>
            {/* JV group cards */}
            {jvGroups.map(g => {
              const partnerInsts = g.partnerIds.map(id => fullInsts[id]).filter(Boolean);
              if (!partnerInsts.length) return null;
              return renderComparisonCard(g.name, partnerInsts, true, g);
            })}
            {/* Individual firm cards */}
            {selectedInstObjects.map(inst =>
              renderComparisonCard(inst.name, [inst], false)
            )}
          </>
        )}
      </div>
    </div>
  );
}

// ─── MASTER DATA ─────────────────────────────────────────────────────────────

function MasterData({clients, onUpdateClients, token, isAdmin, isEditor}) {
  const [tab, setTab] = useState('clients');
  const [clientModal, setClientModal] = useState(null);
  const [search, setSearch] = useState('');
  const [sectorFilter, setSectorFilter] = useState('');
  const [occModal, setOccModal] = useState(null);
  const [trainingTypes, setTrainingTypes] = useState(getTrainingTypes());
  const [ttInput, setTtInput] = useState('');
  const [editTt, setEditTt] = useState(null); // {idx, val}

  const canManageOccs = !!(isAdmin || isEditor);

  React.useEffect(() => {
    window.__masterOpenOccForm = () => { setTab('occupations'); setOccModal({}); };
    return () => { delete window.__masterOpenOccForm; };
  }, []);

  const saveTT = (list) => { saveTrainingTypes(list); TRAINING_TYPES = list; setTrainingTypes(list); };
  const addTT = () => { const v = ttInput.trim(); if (!v) return; saveTT([...trainingTypes, v]); setTtInput(''); };
  const removeTT = (i) => saveTT(trainingTypes.filter((_,idx)=>idx!==i));
  const updateTT = (i, v) => { const l = [...trainingTypes]; l[i]=v; saveTT(l); setEditTt(null); };

  const ClientForm = ({client, onSave, onClose}) => {
    const [form, setForm] = useState(client || {fullName:'', shortName:'', type:'Government', address:'', remarks:''});
    const set = (k,v) => setForm(f=>({...f,[k]:v}));
    return (
      <Modal title={client ? 'Edit client' : 'Add new client'} onClose={onClose}
        footer={<>
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>onSave(form)}>Save client</button>
        </>}>
        <div className="form-group"><label>Full name *</label><input value={form.fullName} onChange={e=>set('fullName',e.target.value)} placeholder="Official full name"/></div>
        <div className="form-row form-row-2">
          <div className="form-group"><label>Short name / acronym *</label><input value={form.shortName} onChange={e=>set('shortName',e.target.value)} placeholder="e.g. PCTVET, FEB"/></div>
          <div className="form-group"><label>Client type</label>
            <select value={form.type} onChange={e=>set('type',e.target.value)}>
              {CLIENT_TYPES.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        </div>
        <div className="form-group"><label>Address</label><input value={form.address} onChange={e=>set('address',e.target.value)}/></div>
        <div className="form-group"><label>Remarks</label><textarea value={form.remarks} onChange={e=>set('remarks',e.target.value)} rows={2}/></div>
      </Modal>
    );
  };

  const saveClient = async (form) => {
    try {
      if(form.id) {
        await api('PUT', `/clients/${form.id}`, clientToAPI(form), token);
        onUpdateClients(clients.map(c=>c.id===form.id ? {...c,...form} : c));
      } else {
        const created = await api('POST', '/clients', clientToAPI(form), token);
        onUpdateClients([...clients, normClient(created)]);
      }
      setClientModal(null);
    } catch(err) {
      alert('Failed to save client: ' + err.message);
    }
  };

  const OccupationForm = ({occ, onSave, onClose}) => {
    const [form, setForm] = useState(occ || {name:'', sector: SECTORS[0]||'', duration:'', level:''});
    const set = (k,v) => setForm(f=>({...f,[k]:v}));
    return (
      <Modal title={occ ? 'Edit occupation' : 'Add occupation'} onClose={onClose}
        footer={<>
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={()=>onSave(form)}>Save</button>
        </>}>
        <div className="form-group"><label>Occupation name *</label><input value={form.name} onChange={e=>set('name',e.target.value)} placeholder="Full occupation name"/></div>
        <div className="form-row form-row-2">
          <div className="form-group"><label>Sector *</label>
            <select value={form.sector} onChange={e=>set('sector',e.target.value)}>
              {SECTORS.map(s=><option key={s}>{s}</option>)}
            </select>
          </div>
          <div className="form-group"><label>Level <span style={{fontWeight:400,color:'var(--text3)'}}>(optional)</span></label>
            <select value={form.level||''} onChange={e=>set('level',e.target.value)}>
              <option value="">— Not specified —</option>
              <option>Level 1</option>
              <option>Level 2</option>
              <option>Level 3</option>
              <option>Professional</option>
            </select>
          </div>
        </div>
        <div className="form-group"><label>Duration (hrs) <span style={{fontWeight:400,color:'var(--text3)'}}>(optional)</span></label><input type="number" value={form.duration||''} onChange={e=>set('duration',e.target.value)} placeholder="e.g. 390"/></div>
      </Modal>
    );
  };

  const saveOccupation = async (form) => {
    try {
      const body = { name: form.name, sector: form.sector, duration: form.duration || null, level: form.level || null };
      if (form.id) {
        const updated = await api('PUT', `/occupations/${form.id}`, body, token);
        const idx = OCCUPATIONS.findIndex(o => o.id === updated.id);
        if (idx >= 0) OCCUPATIONS[idx] = updated;
      } else {
        const created = await api('POST', '/occupations', body, token);
        OCCUPATIONS.push(created);
      }
      setOccModal(null);
    } catch(err) { alert('Failed to save: ' + err.message); }
  };

  const deleteOccupation = async (occ) => {
    if (!confirm(`Delete "${occ.name}"?`)) return;
    try {
      await api('DELETE', `/occupations/${occ.id}`, null, token);
      const idx = OCCUPATIONS.findIndex(o => o.id === occ.id);
      if (idx >= 0) OCCUPATIONS.splice(idx, 1);
      setOccModal(null);
    } catch(err) { alert('Failed to delete: ' + err.message); }
  };

  const allDisplayOccs = OCCUPATIONS.filter(o => {
    const matchSearch = !search || o.name.toLowerCase().includes(search.toLowerCase());
    const matchSector = !sectorFilter || o.sector === sectorFilter;
    return matchSearch && matchSector;
  });
  const filteredOccs = allDisplayOccs;

  const [clientSearch, setClientSearch] = useState('');
  const filteredClients = clients.filter(c =>
    !clientSearch ||
    c.fullName.toLowerCase().includes(clientSearch.toLowerCase()) ||
    c.shortName.toLowerCase().includes(clientSearch.toLowerCase()) ||
    c.type.toLowerCase().includes(clientSearch.toLowerCase())
  );

  const occPagination = usePagination(filteredOccs, 25);
  const clientPagination = usePagination(filteredClients, 20);

  return (
    <div className="fade-in">
      <div className="tabs">
        <button className={`tab ${tab==='clients'?'active':''}`} onClick={()=>setTab('clients')}>Clients ({clients.length})</button>
        <button className={`tab ${tab==='occupations'?'active':''}`} onClick={()=>setTab('occupations')}>Occupations ({OCCUPATIONS.length})</button>
        <button className={`tab ${tab==='training_types'?'active':''}`} onClick={()=>setTab('training_types')}>Training Types ({trainingTypes.length})</button>
      </div>

      {tab==='clients' && (
        <>
          <div style={{display:'flex', gap:12, marginBottom:16}}>
            <div className="search-wrap" style={{flex:1}}>
              <span className="search-icon">🔍</span>
              <input value={clientSearch} onChange={e=>setClientSearch(e.target.value)} placeholder="Search clients by name, acronym or type..."/>
            </div>
            <button className="btn btn-primary btn-sm" onClick={()=>setClientModal({type:'add'})}>+ Add client</button>
          </div>
          <div className="card" style={{padding:0, overflow:'hidden'}}>
            <table>
              <thead><tr><th>Short name</th><th>Full name</th><th>Type</th><th>Address</th><th></th></tr></thead>
              <tbody>

function NepalMap({institutes, onSelect}) {
  const mapRef = React.useRef(null);
  const mapInstanceRef = React.useRef(null);
  const markersRef = React.useRef([]);

  useEffect(() => {
    if(!window.L) return;
    if(!mapInstanceRef.current) {
      mapInstanceRef.current = window.L.map(mapRef.current, {
        center: [28.3949, 84.1240],
        zoom: 7,
        minZoom: 6,
        maxZoom: 14,
        maxBounds: NEPAL_BOUNDS,
        maxBoundsViscosity: 1.0,
        zoomControl: true,
      });

      // Administrative tile — clean political style
      window.L.tileLayer(
        'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
        {
          attribution: '© OpenStreetMap contributors © CARTO',
          subdomains: 'abcd',
          maxZoom: 14,
        }
      ).addTo(mapInstanceRef.current);

      // Restrict initial view to Nepal
      mapInstanceRef.current.fitBounds(NEPAL_BOUNDS);
    }

    markersRef.current.forEach(m => m.remove());
    markersRef.current = [];

    institutes.forEach(inst => {
      let coords = null;
      let isPrecise = false;
      if (inst.latitude && inst.longitude) {
        coords = [parseFloat(inst.latitude), parseFloat(inst.longitude)];
        isPrecise = true;
      } else {
        for(const [district, c] of Object.entries(DISTRICT_COORDS)) {
          if(inst.address && inst.address.toLowerCase().includes(district.toLowerCase())) {
            coords = c; break;
          }
        }
        if(!coords) coords = [27.7172 + (Math.random()-0.5)*0.3, 85.3240 + (Math.random()-0.5)*0.3];
      }

      const color = inst.status === 'Active' ? '#2D5A3D' : inst.status === 'Pending Renewal' ? '#C4730A' : '#B53A2F';
      const size = isPrecise ? 14 : 11;
      const icon = window.L.divIcon({
        className: '',
        html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,0.3);cursor:pointer;${isPrecise ? '' : 'opacity:0.7;'}"></div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });

      const coordStr = isPrecise
        ? `<br/><span style="color:#888;font-size:10px;font-family:monospace">${parseFloat(inst.latitude).toFixed(5)}, ${parseFloat(inst.longitude).toFixed(5)}</span>`
        : `<br/><span style="color:#aaa;font-size:10px">📍 Approximate location</span>`;
      const mapsUrl = isPrecise
        ? `https://www.google.com/maps?q=${inst.latitude},${inst.longitude}`
        : inst.googleMapLink || '';
      const mapLink = mapsUrl
        ? `<br/><a href="${mapsUrl}" target="_blank" rel="noreferrer" style="color:#2563eb;font-size:11px;">📍 Open in Google Maps</a>`
        : '';

      const marker = window.L.marker(coords, {icon})
        .addTo(mapInstanceRef.current)
        .bindPopup(
          `<strong style="font-size:13px">${inst.acronym ? '['+inst.acronym+'] ' : ''}${inst.name}</strong>` +
          `<br/><span style="color:#666;font-size:11px">${inst.address||''}</span>` +
          `<br/><span style="color:${color};font-size:11px;font-weight:600">${inst.status}</span>` +
          coordStr + mapLink
        );

      marker.on('click', () => onSelect(inst));
      markersRef.current.push(marker);
    });
  }, [institutes]);

  return <div ref={mapRef} style={{height:320, width:'100%', borderRadius:8, overflow:'hidden'}}/>;
}

function exportToCSV(rows, filename) {
  if(!rows || rows.length === 0) { alert('No data to export.'); return; }
  const headers = Object.keys(rows[0]);
  const csv = [
    headers.join(','),
    ...rows.map(row => headers.map(h => {
      const val = row[h] === null || row[h] === undefined ? '' : String(row[h]);
      return val.includes(',') || val.includes('"') || val.includes('\n')
        ? `"${val.replace(/"/g, '""')}"` : val;
    }).join(','))
  ].join('\n');
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// API base URL — reads from localStorage so self-hosted users can point at their own backend.
// Default is '/api' (relative) which works on Vercel (rewrite to Railway).
const API_URL_KEY = 'tvettrack_api_url';
function getApiBase() {
  try {
    const custom = localStorage.getItem(API_URL_KEY);
    if (custom && custom.trim()) return custom.replace(/\/+$/, '');
  } catch {}
  return ''; // empty = use relative '/api'
}
const API_BASE_PATH = '/api';

async function api(method, path, body, token, _retry = 0) {
  const base = getApiBase();
  const url = (base || '') + API_BASE_PATH + path;
  const headers = { 'Content-Type': 'application/json' };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  let res;
  try {
    res = await fetch(url, {
      method,
      headers,
      body: body ? JSON.stringify(body) : undefined,
      cache: 'no-store',
    });
  } catch(fetchErr) {
    if (_retry < 2) {
      await new Promise(r => setTimeout(r, 300 * (_retry + 1)));
      return api(method, path, body, token, _retry + 1);
    }
    throw new Error('Network error — could not reach server. Check your internet connection.');
  }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    const msg = err.error || res.statusText;
    const e = new Error(msg);
    e.status = res.status;
    // On 401, the token is bad/expired — clear the session so the app shows login.
    if (res.status === 401) {
      try { localStorage.removeItem('tvettrack_session'); } catch {}
      // Notify listeners (the App component subscribes via window event)
      window.dispatchEvent(new CustomEvent('tvettrack:session-expired'));
    }
    throw e;
  }
  return res.json();
}

// Normalize API snake_case → frontend camelCase
function normInst(r) {
  return {
    id: r.id,
    name: r.name || '',
    acronym: r.acronym || '',
    regNo: r.reg_no || '',
    regDate: r.reg_date || '',
    pan: r.pan || '',
    permanentAccountNo: r.permanent_account_no || '',
    contactPerson: r.contact_person || '',
    phone: r.phone || '',
    email: r.email || '',
    address: r.address || '',
    type: r.type || 'Private',
    status: r.status || 'Active',
    renewalDue: r.renewal_due || '',
    remarks: r.remarks || '',
    logo: r.logo || null,
    website: r.website || '',
    googleMapLink: r.google_map_link || '',
    latitude: r.latitude != null ? String(r.latitude) : '',
    longitude: r.longitude != null ? String(r.longitude) : '',
    experience: (r.experience || []).map(normExp),
    nstb: (r.nstb || []).map(n => n.fiscal_year !== undefined ? normNSTBR(n) : n),
    taxClearance: (r.taxClearance || r.tax_clearance || []).map(t => t.fiscal_year !== undefined ? normTaxR(t) : t),
    affiliation: (r.affiliation || []).map(a => a.affiliation_date !== undefined ? normAffR(a) : a),
    totalTrainees: parseInt(r.total_trainees) || 0,
    totalStAppeared: parseInt(r.total_st_appeared) || 0,
    totalClients: parseInt(r.total_clients) || 0,
    totalAffPrograms: parseInt(r.total_aff_programs) || 0,
  };
}

function normExp(r) {
  return {
    id: r.id,
    clientId: r.client_id,
    clientName: r.client_name_manual || '',
    manualClient: !!r.client_name_manual && !r.client_id,
    assignmentName: r.assignment_name || '',
    trainingType: r.training_type || '',
    fy: r.fiscal_year || '',
    startDate: r.start_date || '',
    endDate: r.end_date || '',
    contractValue: r.contract_value != null ? String(r.contract_value) : '',
    startFY: r.start_fy || '',
    endFY: r.end_fy || '',
    remarks: r.remarks || '',
    referenceFile: r.reference_file || r.letter_file || null,
    referenceFileName: r.reference_file_name || r.letter_file_name || '',
    isGesi: !!r.is_gesi,
    isResidential: !!r.is_residential,
    occupations: (r.occupations || []).map(o => ({
      id: o.id,
      nameInLetter: o.name_in_letter || '',
      ctevtOccupationId: o.ctevt_occupation_id || '',
      trainees: o.trainees ?? '',
      duration: o.duration_hours ?? '',
      level: o.level || '',
      skillTestProvisioned: !!o.skill_test_provisioned,
      skillTestAppeared: o.skill_test_appeared ?? '',
      skillTestPass: o.skill_test_pass ?? '',
      employmentProvisioned: !!o.employment_provisioned,
      employmentActual: o.employment_actual_pct ?? '',
      locations: (o.locations || []).map(l => ({
        id: uid(),
        province: l.province || '',
        district: l.district || '',
        localLevel: l.local_level || l.localLevel || '',
        localLevelType: l.local_level_type || l.localLevelType || '',
      })),
    })),
    locations: [],
  };
}

function normNSTBR(r) {
  return {
    id: r.id,
    fy: r.fiscal_year || '',
    letterNo: r.letter_no || '',
    letterDate: r.letter_date || '',
    letterType: r.letter_type || '',
    occupation: r.occupation || '',
    ctevtOccupationId: r.ctevt_occupation_id || '',
    level: r.level || '',
    applied: r.applied ?? '',
    appeared: r.appeared ?? '',
    pass: r.pass ?? '',
    remarks: r.remarks || '',
  };
}

function normTaxR(r) {
  return {
    id: r.id,
    fy: r.fiscal_year || '',

const USERS_KEY = 'tvettrack_users';
const SESSION_KEY = 'tvettrack_session';

const DEFAULT_USERS = [
  { id: 1, username: 'admin', password: 'admin123', fullName: 'Administrator', role: 'admin', active: true, createdAt: '2025-01-01' },
  { id: 2, username: 'viewer', password: 'viewer123', fullName: 'Viewer User', role: 'viewer', active: true, createdAt: '2025-01-01' },
];

function loadUsers() {
  try { const r = localStorage.getItem(USERS_KEY); return r ? JSON.parse(r) : DEFAULT_USERS; } catch { return DEFAULT_USERS; }
}
function saveUsers(users) {
  try { localStorage.setItem(USERS_KEY, JSON.stringify(users)); } catch(e) {}
}
function getSession() {
  try { const r = localStorage.getItem(SESSION_KEY); return r ? JSON.parse(r) : null; } catch { return null; }
}
function setSession(user) {
  try { localStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch(e) {}
}
function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}
